<!doctype html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>PetPass</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      body{font-family:system-ui; padding:16px; background:#f5f7fb; margin:0;}
      .card{border:1px solid #ddd; border-radius:16px; padding:16px; background:white; max-width:540px; margin:16px auto;}
      button{padding:12px 14px; border-radius:12px; border:0; cursor:pointer;}
      .pet-card{border:1px solid #ececec; border-radius:12px; padding:12px; margin-top:10px;}
      .pet-type{font-size:13px; color:#555;}
      .primary{background:#2b7cff; color:#fff;}
      .muted{color:#666;}
    </style>
  </head>
  <body>
    <div class="card">
      <h2>PetPass 🐶🐱</h2>
      <div id="u" class="muted">Загрузка...</div>
      <div id="pets"></div>
      <div id="actions"></div>
      <button onclick="Telegram.WebApp.close()">Закрыть</button>
    </div>

    <script>
      const tg = window.Telegram.WebApp;
      tg.ready();
      const initData = tg.initData;
      const user = tg.initDataUnsafe?.user;

      const userEl = document.getElementById('u');
      const petsEl = document.getElementById('pets');
      const actionsEl = document.getElementById('actions');

      async function bootstrap() {
        if (!initData || !user) {
          userEl.innerText = 'Открыто не из Telegram';
          return;
        }

        try {
          const response = await fetch('/api/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ initData }),
          });

          if (!response.ok) {
            userEl.innerText = 'Ошибка авторизации Mini App';
            return;
          }

          const data = await response.json();
          const firstName = data.user?.first_name || user.first_name || 'друг';
          userEl.innerText = `Привет, ${firstName}!`;

          const pets = Array.isArray(data.pets) ? data.pets : [];
          if (!pets.length) {
            petsEl.innerHTML = '<p class="muted">Питомцев пока нет.</p>';
            actionsEl.innerHTML = '<button class="primary">+ Добавить питомца</button>';
            return;
          }

          petsEl.innerHTML = pets.map((pet) => (
            `<div class="pet-card"><strong>${pet.name}</strong><div class="pet-type">${pet.type}</div></div>`
          )).join('');
        } catch (error) {
          userEl.innerText = 'Сервер недоступен. Попробуйте позже.';
        }
      }

      bootstrap();
    </script>
  </body>
</html>
