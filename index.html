<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PetPass</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; background: #f6f7fb; }
      .card { border: 1px solid #ddd; border-radius: 16px; padding: 16px; background: white; max-width: 540px; margin: 16px auto; }
      button { padding: 12px 14px; border-radius: 12px; border: 0; cursor: pointer; }
      .pet-card { border: 1px solid #ececec; border-radius: 12px; padding: 12px; margin-top: 10px; cursor: pointer; }
      .pet-type { font-size: 13px; color: #555; }
      .primary { background: #2b7cff; color: #fff; }
      .muted { color: #666; }
      .hidden { display: none; }
      .row { display: flex; gap: 8px; margin-top: 10px; }
      .type-btn { background: #eef2ff; color: #1f2a44; }
      .type-btn.active { background: #2b7cff; color: #fff; }
      .field { width: 100%; box-sizing: border-box; margin-top: 10px; padding: 10px 12px; border: 1px solid #d6dbe7; border-radius: 10px; }
      .error { color: #b42318; margin-top: 8px; font-size: 14px; }
      .back-btn { background: #eef2ff; color: #1f2a44; }
      .pet-banner { border-radius: 14px; padding: 18px; font-size: 42px; text-align: center; margin: 10px 0 16px; }
      .pet-banner.dog { background: #e7f0ff; }
      .pet-banner.cat { background: #ffeede; }
      .pet-name { font-size: 28px; font-weight: 700; margin: 0 0 16px; }
      .tile-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .tile { border: 1px solid #dbe1f0; background: #f8faff; color: #1f2a44; text-align: left; min-height: 64px; }
      .subtiles { margin-top: 8px; display: flex; gap: 8px; }
      .subtile { background: #eef2ff; color: #1f2a44; flex: 1; }
      .status { margin-top: 10px; padding: 10px 12px; border-radius: 10px; font-size: 14px; }
      .status.success { background: #e8f8ef; color: #0f5132; border: 1px solid #b7ebcc; }
      .status.error { background: #fdecec; color: #842029; border: 1px solid #f5c2c7; }
      .label { display: block; margin-top: 10px; margin-bottom: 4px; font-size: 14px; color: #374151; }
      .birth-mode { display: flex; gap: 10px; margin-top: 8px; }
      .birth-mode label { display: flex; align-items: center; gap: 6px; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>PetPass 🐶🐱</h2>
      <div id="u" class="muted">Загрузка...</div>

      <div id="screenList">
        <div id="pets"></div>

        <div id="actions" class="row">
          <button id="toggleFormBtn" class="primary">+ Добавить питомца</button>
        </div>

        <div id="createPetForm" class="hidden">
          <input id="petNameInput" class="field" type="text" placeholder="Имя питомца" maxlength="64" />
          <div class="row">
            <button id="dogTypeBtn" type="button" class="type-btn active">🐶 Собакен</button>
            <button id="catTypeBtn" type="button" class="type-btn">🐱 Котофей</button>
          </div>
          <div class="row">
            <button id="savePetBtn" type="button" class="primary">Сохранить</button>
          </div>
          <div id="formError" class="error"></div>
        </div>
      </div>

      <div id="screenPet" class="hidden"></div>
      <div id="screenSection" class="hidden"></div>

      <div class="row">
        <button onclick="Telegram.WebApp.close()">Закрыть</button>
      </div>
    </div>

    <script>
      const tg = window.Telegram.WebApp;
      tg.ready();

      const user = tg.initDataUnsafe?.user;
      const tgUserId = user?.id;

      const userEl = document.getElementById('u');
      const petsEl = document.getElementById('pets');
      const formEl = document.getElementById('createPetForm');
      const toggleFormBtn = document.getElementById('toggleFormBtn');
      const petNameInput = document.getElementById('petNameInput');
      const savePetBtn = document.getElementById('savePetBtn');
      const dogTypeBtn = document.getElementById('dogTypeBtn');
      const catTypeBtn = document.getElementById('catTypeBtn');
      const formErrorEl = document.getElementById('formError');
      const screenListEl = document.getElementById('screenList');
      const screenPetEl = document.getElementById('screenPet');
      const screenSectionEl = document.getElementById('screenSection');

      const typeLabel = { dog: '🐶 Собакен', cat: '🐱 Котофей' };
      const sectionLabel = {
        info: 'Информация о питомце',
        vaccinations: 'Вакцинация',
        treatments: 'Обработка',
        weight: 'Вес',
        weights: 'Вес',
        walk: 'Прогулка',
        walks: 'Прогулка',
        events: 'События',
      };

      let selectedType = 'dog';
      let infoStatusTimer = null;
      let activeWalkTimer = null;

      function formatDateRu(isoDate) {
        if (!isoDate) return '';
        const [year, month, day] = String(isoDate).split('-');
        if (!year || !month || !day) return isoDate;
        return `${day}.${month}.${year}`;
      }

      function formatDateTimeRu(rawDateTime) {
        if (!rawDateTime) return '';
        const date = new Date(rawDateTime);
        if (Number.isNaN(date.getTime())) return String(rawDateTime);

        const day = String(date.getDate()).padStart(2, '0');
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const year = String(date.getFullYear());
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');

        return `${day}.${month}.${year} ${hours}:${minutes}`;
      }

      function formatDurationHms(totalSeconds) {
        const safeSeconds = Math.max(0, Math.floor(totalSeconds));
        const hours = String(Math.floor(safeSeconds / 3600)).padStart(2, '0');
        const minutes = String(Math.floor((safeSeconds % 3600) / 60)).padStart(2, '0');
        const seconds = String(safeSeconds % 60).padStart(2, '0');
        return `${hours}:${minutes}:${seconds}`;
      }

      function setType(type) {
        selectedType = type;
        dogTypeBtn.classList.toggle('active', type === 'dog');
        catTypeBtn.classList.toggle('active', type === 'cat');
      }

      function getApiHeaders() {
        return {
          'Content-Type': 'application/json',
          'X-TG-USER-ID': String(tgUserId),
        };
      }

      function showScreen(screen) {
        screenListEl.classList.toggle('hidden', screen !== 'list');
        screenPetEl.classList.toggle('hidden', screen !== 'pet');
        screenSectionEl.classList.toggle('hidden', screen !== 'section');
      }

      function setHash(nextHash) {
        if (window.location.hash === nextHash) {
          renderRoute();
          return;
        }
        window.location.hash = nextHash;
      }

      function renderPets(pets) {
        if (!pets.length) {
          petsEl.innerHTML = '<p class="muted">Питомцев пока нет.</p>';
          return;
        }

        petsEl.innerHTML = pets
          .map((pet) => (
            `<div class="pet-card" data-pet-id="${pet.id}"><strong>${pet.name}</strong><div class="pet-type">${typeLabel[pet.type] || pet.type}</div></div>`
          ))
          .join('');

        petsEl.querySelectorAll('.pet-card').forEach((cardEl) => {
          cardEl.addEventListener('click', () => {
            const petId = cardEl.getAttribute('data-pet-id');
            setHash(`#pet/${petId}`);
          });
        });
      }

      async function loadPets() {
        const response = await fetch('/api/pets', {
          method: 'GET',
          headers: getApiHeaders(),
        });

        if (!response.ok) {
          throw new Error('Не удалось получить список питомцев');
        }

        const data = await response.json();
        const pets = Array.isArray(data.pets) ? data.pets : [];
        renderPets(pets);
      }

      async function fetchPet(petId) {
        const response = await fetch(`/api/pets/${petId}`, {
          method: 'GET',
          headers: getApiHeaders(),
        });

        if (response.status === 404) {
          return null;
        }

        if (!response.ok) {
          throw new Error('Не удалось получить профиль питомца');
        }

        const data = await response.json();
        return data.pet || null;
      }

      function renderPetProfile(pet) {
        const petEmoji = pet.type === 'cat' ? '🐱' : '🐶';
        const bannerClass = pet.type === 'cat' ? 'cat' : 'dog';

        screenPetEl.innerHTML = `
          <div class="row"><button class="back-btn" id="backToListBtn">← Назад</button></div>
          <div class="pet-banner ${bannerClass}">${petEmoji}</div>
          <h3 class="pet-name">${pet.name}</h3>

          <div class="tile-grid">
            <button class="tile" data-section="info">Информация о питомце</button>
            <button class="tile" data-section="vaccinations">Вакцинация</button>
            <div>
              <button class="tile" data-section="treatment">Обработка</button>
              <div class="subtiles">
                <button class="subtile" data-section="treatments-fleas">от блох</button>
                <button class="subtile" data-section="treatments-worms">от глистов</button>
              </div>
            </div>
            <button class="tile" data-section="weights">Вес</button>
            <button class="tile" data-section="walk">Прогулка</button>
            <button class="tile" data-section="events">События</button>
          </div>
        `;

        document.getElementById('backToListBtn').addEventListener('click', () => setHash('#list'));
        screenPetEl.querySelectorAll('[data-section]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const section = btn.getAttribute('data-section');
            setHash(`#pet/${pet.id}/${section}`);
          });
        });
      }

      function renderSectionScreen(petId, section) {
        if (section === 'info') {
          renderPetInfoScreen(petId);
          return;
        }

        if (section === 'vaccination') {
          setHash(`#pet/${petId}/vaccinations`);
          return;
        }

        if (section === 'vaccinations') {
          renderVaccinationsScreen(petId);
          return;
        }

        if (section === 'treatment') {
          setHash(`#pet/${petId}/treatments`);
          return;
        }

        if (section === 'treatments' || section === 'treatments-fleas') {
          renderTreatmentsScreen(petId, 'fleas');
          return;
        }

        if (section === 'treatments-worms') {
          renderTreatmentsScreen(petId, 'worms');
          return;
        }

        if (section === 'weight') {
          setHash(`#pet/${petId}/weights`);
          return;
        }

        if (section === 'weights') {
          renderWeightsScreen(petId);
          return;
        }

        if (section === 'walk') {
          setHash(`#pet/${petId}/walks`);
          return;
        }

        if (section === 'walks') {
          renderWalksScreen(petId);
          return;
        }

        if (section === 'events') {
          renderEventsScreen(petId);
          return;
        }

        const sectionText = sectionLabel[section] || section;
        screenSectionEl.innerHTML = `
          <div class="row"><button class="back-btn" id="backToProfileBtn">← Назад в профиль</button></div>
          <h3>${sectionText}</h3>
          <p class="muted">Скоро будет раздел ${sectionText}</p>
        `;

        document.getElementById('backToProfileBtn').addEventListener('click', () => setHash(`#pet/${petId}`));
      }

      async function fetchVaccinations(petId) {
        const response = await fetch(`/api/pets/${petId}/vaccinations`, {
          method: 'GET',
          headers: getApiHeaders(),
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          const error = new Error(errData.error || 'Не удалось загрузить вакцинации');
          error.status = response.status;
          throw error;
        }

        const data = await response.json();
        return Array.isArray(data.vaccinations) ? data.vaccinations : [];
      }

      async function createVaccination(petId, payload) {
        const response = await fetch(`/api/pets/${petId}/vaccinations`, {
          method: 'POST',
          headers: getApiHeaders(),
          body: JSON.stringify(payload),
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          const error = new Error(errData.error || 'Не удалось сохранить вакцинацию');
          error.status = response.status;
          throw error;
        }

        return response.json();
      }

      function setVaccinationStatus(type, message) {
        const statusEl = document.getElementById('vaccinationStatus');
        if (!statusEl) return;
        statusEl.className = `status ${type}`;
        statusEl.innerText = message;
        statusEl.classList.remove('hidden');
      }

      function hideVaccinationStatus() {
        const statusEl = document.getElementById('vaccinationStatus');
        if (!statusEl) return;
        statusEl.classList.add('hidden');
      }

      function renderVaccinationsList(vaccinations) {
        const listEl = document.getElementById('vaccinationsList');
        if (!listEl) return;

        if (!vaccinations.length) {
          listEl.innerHTML = '<p class="muted">Записей вакцинации пока нет.</p>';
          return;
        }

        listEl.innerHTML = vaccinations
          .map((item) => {
            const nextDueText = item.next_due
              ? `<div class="muted">Следующая: ${formatDateRu(item.next_due)}</div>`
              : '';
            const notesText = item.notes
              ? `<div class="muted">Заметка: ${item.notes}</div>`
              : '';

            return `
              <div class="pet-card">
                <strong>${formatDateRu(item.date_given)} — ${item.vaccine_name}</strong>
                ${nextDueText}
                ${notesText}
              </div>
            `;
          })
          .join('');
      }

      async function refreshVaccinations(petId) {
        const vaccinations = await fetchVaccinations(petId);
        renderVaccinationsList(vaccinations);
      }

      function resetVaccinationForm() {
        document.getElementById('vaccVaccineName').value = '';
        document.getElementById('vaccDateGiven').value = '';
        document.getElementById('vaccNextDue').value = '';
        document.getElementById('vaccNotes').value = '';
      }

      function toggleVaccinationForm(show) {
        const formEl = document.getElementById('vaccinationForm');
        const addBtn = document.getElementById('showVaccinationFormBtn');
        if (!formEl || !addBtn) return;
        formEl.classList.toggle('hidden', !show);
        addBtn.classList.toggle('hidden', show);
      }

      async function renderVaccinationsScreen(petId) {
        screenSectionEl.innerHTML = `
          <div class="row"><button class="back-btn" id="backToProfileBtn">← Назад</button></div>
          <h3>Вакцинация</h3>
          <div id="vaccinationStatus" class="status hidden"></div>
          <div id="vaccinationsList"></div>

          <div class="row">
            <button id="showVaccinationFormBtn" type="button" class="primary">+ Добавить вакцинацию</button>
          </div>

          <div id="vaccinationForm" class="hidden">
            <label class="label" for="vaccVaccineName">Название вакцины</label>
            <input id="vaccVaccineName" class="field" type="text" maxlength="128" />

            <label class="label" for="vaccDateGiven">Дата вакцинации</label>
            <input id="vaccDateGiven" class="field" type="date" />

            <label class="label" for="vaccNextDue">Следующая вакцинация (опционально)</label>
            <input id="vaccNextDue" class="field" type="date" />

            <label class="label" for="vaccNotes">Заметка (опционально)</label>
            <textarea id="vaccNotes" class="field" rows="3" maxlength="500"></textarea>

            <div class="row">
              <button id="saveVaccinationBtn" type="button" class="primary">Сохранить</button>
              <button id="cancelVaccinationBtn" type="button" class="back-btn">Отмена</button>
            </div>
          </div>
        `;

        document.getElementById('backToProfileBtn').addEventListener('click', () => setHash(`#pet/${petId}`));
        document.getElementById('showVaccinationFormBtn').addEventListener('click', () => {
          hideVaccinationStatus();
          toggleVaccinationForm(true);
        });

        document.getElementById('cancelVaccinationBtn').addEventListener('click', () => {
          resetVaccinationForm();
          hideVaccinationStatus();
          toggleVaccinationForm(false);
        });

        document.getElementById('saveVaccinationBtn').addEventListener('click', async () => {
          const saveBtn = document.getElementById('saveVaccinationBtn');
          const vaccineName = document.getElementById('vaccVaccineName').value.trim();
          const dateGiven = document.getElementById('vaccDateGiven').value;
          const nextDue = document.getElementById('vaccNextDue').value;
          const notes = document.getElementById('vaccNotes').value.trim();

          if (!vaccineName) {
            setVaccinationStatus('error', 'Укажите название вакцины.');
            return;
          }
          if (!dateGiven) {
            setVaccinationStatus('error', 'Укажите дату вакцинации.');
            return;
          }

          const payload = {
            vaccine_name: vaccineName,
            date_given: dateGiven,
            next_due: nextDue || null,
            notes: notes || null,
          };

          saveBtn.disabled = true;
          try {
            await createVaccination(petId, payload);
            setVaccinationStatus('success', 'Вакцинация сохранена ✅');
            resetVaccinationForm();
            toggleVaccinationForm(false);
            await refreshVaccinations(petId);
          } catch (error) {
            const statusCodeText = error.status ? ` (${error.status})` : '';
            setVaccinationStatus('error', `Ошибка${statusCodeText}: ${error.message || 'не удалось сохранить запись.'}`);
          } finally {
            saveBtn.disabled = false;
          }
        });

        try {
          await refreshVaccinations(petId);
        } catch (error) {
          const statusCodeText = error.status ? ` (${error.status})` : '';
          setVaccinationStatus('error', `Ошибка${statusCodeText}: ${error.message || 'не удалось загрузить список вакцинаций.'}`);
          renderVaccinationsList([]);
        }
      }

      async function fetchTreatments(petId, treatmentType) {
        const response = await fetch(`/api/pets/${petId}/treatments?type=${encodeURIComponent(treatmentType)}`, {
          method: 'GET',
          headers: getApiHeaders(),
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          const error = new Error(errData.error || 'Не удалось загрузить обработки');
          error.status = response.status;
          throw error;
        }

        const data = await response.json();
        return Array.isArray(data.treatments) ? data.treatments : [];
      }

      async function createTreatment(petId, payload) {
        const response = await fetch(`/api/pets/${petId}/treatments`, {
          method: 'POST',
          headers: getApiHeaders(),
          body: JSON.stringify(payload),
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          const error = new Error(errData.error || 'Не удалось сохранить обработку');
          error.status = response.status;
          throw error;
        }

        return response.json();
      }

      function setTreatmentStatus(type, message) {
        const statusEl = document.getElementById('treatmentStatus');
        if (!statusEl) return;
        statusEl.className = `status ${type}`;
        statusEl.innerText = message;
        statusEl.classList.remove('hidden');
      }

      function hideTreatmentStatus() {
        const statusEl = document.getElementById('treatmentStatus');
        if (!statusEl) return;
        statusEl.classList.add('hidden');
      }

      function renderTreatmentsList(items) {
        const listEl = document.getElementById('treatmentsList');
        if (!listEl) return;

        if (!items.length) {
          listEl.innerHTML = '<p class="muted">Записей пока нет.</p>';
          return;
        }

        listEl.innerHTML = items
          .map((item) => {
            const nextDueText = item.next_due
              ? `<div class="muted">Следующая: ${formatDateRu(item.next_due)}</div>`
              : '';
            const notesText = item.notes
              ? `<div class="muted">Заметка: ${item.notes}</div>`
              : '';

            return `
              <div class="pet-card">
                <strong>${formatDateRu(item.date_given)} — ${item.product_name}</strong>
                ${nextDueText}
                ${notesText}
              </div>
            `;
          })
          .join('');
      }

      function resetTreatmentForm() {
        document.getElementById('treatmentProductName').value = '';
        document.getElementById('treatmentDateGiven').value = '';
        document.getElementById('treatmentNextDue').value = '';
        document.getElementById('treatmentNotes').value = '';
      }

      function toggleTreatmentForm(show) {
        const formNode = document.getElementById('treatmentForm');
        const addBtn = document.getElementById('showTreatmentFormBtn');
        if (!formNode || !addBtn) return;
        formNode.classList.toggle('hidden', !show);
        addBtn.classList.toggle('hidden', show);
      }

      async function renderTreatmentsScreen(petId, initialType = 'fleas') {
        let currentType = initialType === 'worms' ? 'worms' : 'fleas';

        screenSectionEl.innerHTML = `
          <div class="row"><button class="back-btn" id="backToProfileBtn">← Назад</button></div>
          <h3>Обработка</h3>

          <div class="row">
            <button id="treatmentTabFleas" type="button" class="type-btn">От блох</button>
            <button id="treatmentTabWorms" type="button" class="type-btn">От глистов</button>
          </div>

          <div id="treatmentStatus" class="status hidden"></div>
          <div id="treatmentsList"></div>

          <div class="row">
            <button id="showTreatmentFormBtn" type="button" class="primary">+ Добавить обработку</button>
          </div>

          <div id="treatmentForm" class="hidden">
            <label class="label" for="treatmentProductName">Препарат</label>
            <input id="treatmentProductName" class="field" type="text" maxlength="128" />

            <label class="label" for="treatmentDateGiven">Дата обработки</label>
            <input id="treatmentDateGiven" class="field" type="date" />

            <label class="label" for="treatmentNextDue">Следующая обработка (опционально)</label>
            <input id="treatmentNextDue" class="field" type="date" />

            <label class="label" for="treatmentNotes">Заметка (опционально)</label>
            <textarea id="treatmentNotes" class="field" rows="3" maxlength="500"></textarea>

            <div class="row">
              <button id="saveTreatmentBtn" type="button" class="primary">Сохранить</button>
              <button id="cancelTreatmentBtn" type="button" class="back-btn">Отмена</button>
            </div>
          </div>
        `;

        const tabFleasBtn = document.getElementById('treatmentTabFleas');
        const tabWormsBtn = document.getElementById('treatmentTabWorms');

        function syncTabs() {
          tabFleasBtn.classList.toggle('active', currentType === 'fleas');
          tabWormsBtn.classList.toggle('active', currentType === 'worms');
        }

        async function refreshTreatments() {
          const items = await fetchTreatments(petId, currentType);
          renderTreatmentsList(items);
        }

        async function switchType(nextType) {
          currentType = nextType;
          syncTabs();
          hideTreatmentStatus();
          try {
            await refreshTreatments();
          } catch (error) {
            const statusCodeText = error.status ? ` (${error.status})` : '';
            setTreatmentStatus('error', `Ошибка${statusCodeText}: ${error.message || 'не удалось загрузить список обработок.'}`);
            renderTreatmentsList([]);
          }
        }

        document.getElementById('backToProfileBtn').addEventListener('click', () => setHash(`#pet/${petId}`));
        document.getElementById('showTreatmentFormBtn').addEventListener('click', () => {
          hideTreatmentStatus();
          toggleTreatmentForm(true);
        });
        document.getElementById('cancelTreatmentBtn').addEventListener('click', () => {
          resetTreatmentForm();
          hideTreatmentStatus();
          toggleTreatmentForm(false);
        });
        tabFleasBtn.addEventListener('click', () => switchType('fleas'));
        tabWormsBtn.addEventListener('click', () => switchType('worms'));

        document.getElementById('saveTreatmentBtn').addEventListener('click', async () => {
          const saveBtn = document.getElementById('saveTreatmentBtn');
          const productName = document.getElementById('treatmentProductName').value.trim();
          const dateGiven = document.getElementById('treatmentDateGiven').value;
          const nextDue = document.getElementById('treatmentNextDue').value;
          const notes = document.getElementById('treatmentNotes').value.trim();

          if (!productName) {
            setTreatmentStatus('error', 'Укажите препарат.');
            return;
          }
          if (!dateGiven) {
            setTreatmentStatus('error', 'Укажите дату обработки.');
            return;
          }

          const payload = {
            type: currentType,

            startMs: Date.now(),

              started_at: startedAt,
              duration_min: durationMin,

          toggleWalkForm(false);

          const startedAtLocal = document.getElementById('walkStartedAt').value;
          const durationRaw = document.getElementById('walkDurationMin').value;
          const notes = document.getElementById('walkNotes').value.trim();

          if (!startedAtLocal) {
            setWalkStatus('error', 'Укажите дату и время начала прогулки.');
            return;

          const durationMin = Number(durationRaw);
          if (!Number.isInteger(durationMin) || durationMin <= 0) {

            return;

          } finally {
            saveBtn.disabled = false;
          }
        });

        timerBtn.addEventListener('click', async () => {
          const isRunning = activeWalkTimer && activeWalkTimer.petId === petId && activeWalkTimer.startMs;
          if (isRunning) {
            await stopTimerAndSave();
            return;
          }
          startTimer();
        });

        if (activeWalkTimer && activeWalkTimer.petId !== petId) {
          stopActiveWalkTimer(true);

        syncTimerUi();
        if (activeWalkTimer && activeWalkTimer.petId === petId && !activeWalkTimer.intervalId) {
          activeWalkTimer.intervalId = setInterval(syncTimerUi, 1000);

        try {
          await refreshWalks();
        } catch (error) {
          const statusCodeText = error.status ? ` (${error.status})` : '';
          setWalkStatus('error', `Ошибка${statusCodeText}: ${error.message || 'не удалось загрузить список прогулок.'}`);

      async function savePetInfo(petId) {
        const saveBtn = document.getElementById('saveInfoBtn');
        const name = document.getElementById('infoNameInput').value.trim();
        const sex = document.getElementById('infoSexSelect').value;
        const chipNumberRaw = document.getElementById('infoChipInput').value.trim();
        const birthMode = document.querySelector('input[name="birthMode"]:checked')?.value || 'date';
        const birthDate = document.getElementById('infoBirthDate').value;
        const birthYearRaw = document.getElementById('infoBirthYear').value.trim();

        if (!name) {
          setInfoStatus('error', 'Имя обязательно для заполнения.');
          return;
        }

        const payload = {
          name,
          sex,
          birth_mode: birthMode,
          chip_number: chipNumberRaw || null,
        };

        if (birthMode === 'date') {
          if (!birthDate) {
            setInfoStatus('error', 'Укажите дату рождения.');
            return;
          }
          payload.birth_date = birthDate;
        } else {
          const birthYear = Number(birthYearRaw);
          if (!Number.isInteger(birthYear) || birthYear < 1900 || birthYear > 2100) {
            setInfoStatus('error', 'Год рождения должен быть от 1900 до 2100.');
            return;
          }
          payload.birth_year = birthYear;
        }

        saveBtn.disabled = true;
        try {
          const response = await fetch(`/api/pets/${petId}`, {
            method: 'PATCH',
            headers: getApiHeaders(),
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(errData.error || 'Не удалось сохранить изменения');
          }

          setInfoStatus('success', 'Сохранено ✅');
          setTimeout(() => setHash(`#pet/${petId}`), 800);
        } catch (error) {
          setInfoStatus('error', error.message || 'Ошибка сохранения. Попробуйте еще раз.');
        } finally {
          saveBtn.disabled = false;
        }
      }

      async function renderPetInfoScreen(petId) {
        screenSectionEl.innerHTML = `
          <div class="row"><button class="back-btn" id="backToProfileBtn">← Назад</button></div>
          <h3>Информация о питомце</h3>
          <label class="label" for="infoNameInput">Имя</label>
          <input id="infoNameInput" class="field" type="text" maxlength="64" />

          <label class="label" for="infoSexSelect">Пол</label>
          <select id="infoSexSelect" class="field">
            <option value="unknown">Неизвестно</option>
            <option value="male">Самец</option>
            <option value="female">Самка</option>
          </select>

          <label class="label">Дата рождения</label>
          <div class="birth-mode">
            <label><input id="birthModeDate" type="radio" name="birthMode" value="date" checked /> Точная дата</label>
            <label><input id="birthModeYear" type="radio" name="birthMode" value="year" /> Только год</label>
          </div>

          <div id="birthDateWrap">
            <input id="infoBirthDate" class="field" type="date" />
          </div>
          <div id="birthYearWrap" class="hidden">
            <input id="infoBirthYear" class="field" type="number" min="1900" max="2100" placeholder="Например, 2020" />
          </div>

          <label class="label" for="infoChipInput">Номер чипа (опционально)</label>
          <input id="infoChipInput" class="field" type="text" maxlength="128" />

          <div class="row">
            <button id="saveInfoBtn" type="button" class="primary">Сохранить</button>
          </div>
          <div id="infoStatus" class="status hidden"></div>
        `;

        document.getElementById('backToProfileBtn').addEventListener('click', () => setHash(`#pet/${petId}`));
        document.getElementById('birthModeDate').addEventListener('change', () => toggleBirthMode('date'));
        document.getElementById('birthModeYear').addEventListener('change', () => toggleBirthMode('year'));
        document.getElementById('saveInfoBtn').addEventListener('click', () => savePetInfo(petId));

        try {
          const pet = await fetchPet(petId);
          if (!pet) {
            setHash('#list');
            return;
          }

          document.getElementById('infoNameInput').value = pet.name || '';
          document.getElementById('infoSexSelect').value = pet.sex || 'unknown';
          document.getElementById('infoChipInput').value = pet.chip_number || '';

          if (pet.birth_year) {
            document.getElementById('infoBirthYear').value = String(pet.birth_year);
            toggleBirthMode('year');
          } else {
            document.getElementById('infoBirthDate').value = pet.birth_date || '';
            toggleBirthMode('date');
          }
        } catch (error) {
          setInfoStatus('error', 'Не удалось загрузить данные питомца.');
        }
      }

      function toggleForm() {
        formErrorEl.innerText = '';
        const willShow = formEl.classList.contains('hidden');
        formEl.classList.toggle('hidden');
        toggleFormBtn.innerText = willShow ? 'Скрыть форму' : '+ Добавить питомца';
      }

      async function savePet() {
        formErrorEl.innerText = '';
        const name = petNameInput.value.trim();

        if (!name) {
          formErrorEl.innerText = 'Введите имя питомца';
          return;
        }

        savePetBtn.disabled = true;
        try {
          const response = await fetch('/api/pets', {
            method: 'POST',
            headers: getApiHeaders(),
            body: JSON.stringify({ name, type: selectedType }),
          });

          if (!response.ok) {
            throw new Error('Не удалось сохранить питомца');
          }

          formEl.classList.add('hidden');
          toggleFormBtn.innerText = '+ Добавить питомца';
          petNameInput.value = '';
          setType('dog');
          await loadPets();
        } catch (error) {
          formErrorEl.innerText = 'Ошибка сохранения. Попробуйте еще раз.';
        } finally {
          savePetBtn.disabled = false;
        }
      }

      async function renderRoute() {
        if (!tgUserId) {
          showScreen('list');
          return;
        }

        const hash = window.location.hash || '#list';
        const route = hash.replace(/^#/, '');

        if (route === 'list') {
          showScreen('list');
          return;
        }

        const petRouteMatch = route.match(/^pet\/(\d+)(?:\/(.+))?$/);
        if (!petRouteMatch) {
          setHash('#list');
          return;
        }

        const petId = petRouteMatch[1];
        const section = petRouteMatch[2];

        try {
          const pet = await fetchPet(petId);
          if (!pet) {
            setHash('#list');
            return;
          }

          if (section) {
            renderSectionScreen(petId, section);
            showScreen('section');
            return;
          }

          renderPetProfile(pet);
          showScreen('pet');
        } catch (error) {
          userEl.innerText = 'Не удалось загрузить экран питомца.';
          setHash('#list');
        }
      }

      async function bootstrap() {
        if (!tgUserId) {
          userEl.innerText = 'Открыто не из Telegram';
          renderPets([]);
          showScreen('list');
          return;
        }

        const firstName = user?.first_name || 'друг';
        userEl.innerText = `Привет, ${firstName}!`;

        try {
          await loadPets();
          if (!window.location.hash) {
            window.location.hash = '#list';
          }
          await renderRoute();
        } catch (error) {
          userEl.innerText = 'Сервер недоступен. Попробуйте позже.';
          renderPets([]);
          showScreen('list');
        }
      }

      toggleFormBtn.addEventListener('click', toggleForm);
      dogTypeBtn.addEventListener('click', () => setType('dog'));
      catTypeBtn.addEventListener('click', () => setType('cat'));
      savePetBtn.addEventListener('click', savePet);
      window.addEventListener('hashchange', renderRoute);

      bootstrap();
    </script>
  </body>
</html>
