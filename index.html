<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PetPass</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --bg: var(--tg-theme-bg-color, #f6f7fb);
        --card: var(--tg-theme-secondary-bg-color, #ffffff);
        --text: var(--tg-theme-text-color, #111);
        --hint: var(--tg-theme-hint-color, #7a7a7a);
        --btn: var(--tg-theme-button-color, #2ea6ff);
        --btnText: var(--tg-theme-button-text-color, #fff);
        --secondary-bg: color-mix(in srgb, var(--card) 80%, var(--bg));
        --card-bg: var(--card);
        --border: color-mix(in srgb, var(--hint) 22%, transparent);
        --radius: 18px;
        --gap: 12px;
        --shadow: 0 10px 30px rgba(0, 0, 0, .06);
      }
      body { background: var(--bg); color: var(--text); margin: 0; font-family: system-ui, sans-serif; }
      .card { border-radius: calc(var(--radius) + 2px); padding: 16px 16px 84px; background: transparent; max-width: 520px; margin: 0 auto; box-sizing: border-box; }
      button { padding: 12px 14px; border-radius: 12px; border: 1px solid transparent; cursor: pointer; }
      .pet-card { border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-top: 10px; cursor: pointer; background: var(--card-bg); }
      .pet-type { font-size: 13px; color: var(--hint); }
      .primary { background: var(--btn); color: var(--btnText); }
      .muted { color: var(--hint); }
      .hidden { display: none; }
      .row { display: flex; gap: 8px; margin-top: 10px; }
      .type-btn { background: var(--secondary-bg); color: var(--text); }
      .type-btn.active { background: var(--btn); color: var(--btnText); }
      .field { width: 100%; box-sizing: border-box; margin-top: 10px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--card-bg); color: var(--text); }
      .error { color: #b42318; margin-top: 8px; font-size: 14px; }
      .back-btn { background: var(--secondary-bg); color: var(--text); }
      .status { margin-top: 10px; padding: 10px 12px; border-radius: 10px; font-size: 14px; }
      .status.success { background: #e8f8ef; color: #0f5132; border: 1px solid #b7ebcc; }
      .status.error { background: #fdecec; color: #842029; border: 1px solid #f5c2c7; }
      .label { display: block; margin-top: 10px; margin-bottom: 4px; font-size: 14px; color: var(--text); }
      .birth-mode { display: flex; gap: 10px; margin-top: 8px; }
      .birth-mode label { display: flex; align-items: center; gap: 6px; font-size: 14px; }
      .summary-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px; margin-bottom: var(--gap); }
      .summary-title { font-weight: 700; margin-bottom: 10px; font-size: 15px; }
      .summary-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: center; padding: 6px 0; font-size: 14px; }
      .summary-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
      .summary-icon { font-size: 16px; width: 18px; text-align: center; }
      .summary-label { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .summary-value { color: var(--text); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .summary-value.empty { color: var(--hint); }
      .pet-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: var(--gap); }
      .icon-btn { background: var(--card); color: var(--text); padding: 8px 10px; font-size: 14px; border: 1px solid var(--border); }
      .danger-btn { background: color-mix(in srgb, #dc3545 18%, var(--card)); color: #b42318; border-color: color-mix(in srgb, #dc3545 36%, var(--border)); }
      .pet-hero { min-height: 160px; border-radius: var(--radius); background: linear-gradient(160deg, color-mix(in srgb, var(--btn) 22%, var(--card)) 0%, var(--card) 100%); box-shadow: var(--shadow); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; position: relative; text-align: center; margin-bottom: var(--gap); }
      .pet-hero.cat { background: linear-gradient(160deg, color-mix(in srgb, #ffbe7d 38%, var(--card)) 0%, var(--card) 100%); }
      .pet-hero-menu { position: absolute; right: 12px; top: 12px; width: 32px; height: 32px; padding: 0; border-radius: 50%; background: color-mix(in srgb, var(--card) 92%, transparent); color: var(--hint); visibility: hidden; }
      .pet-avatar-wrap { width: 72px; height: 72px; border-radius: 50%; background: var(--card); display: grid; place-items: center; box-shadow: 0 4px 14px rgba(0, 0, 0, .08); }
      .pet-avatar { width: 44px; height: 44px; object-fit: contain; }
      .pet-name { font-size: 28px; font-weight: 700; margin: 10px 0 6px; line-height: 1.1; }
      .chips { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 10px; }
      .chip { padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,.65); backdrop-filter: blur(6px); font-size: 14px; line-height: 1; color: var(--text); }
      .chip.muted { color: var(--hint); }
      .action-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--gap); }
      .action { min-height: 92px; background: var(--card); border-radius: var(--radius); box-shadow: 0 6px 20px rgba(0, 0, 0, .05); padding: 14px; text-align: left; color: var(--text); display: flex; flex-direction: column; gap: 5px; }
      .action-emoji { font-size: 18px; line-height: 1; }
      .action-title { font-size: 15px; font-weight: 600; }
      .action-hint { font-size: 12px; color: var(--hint); line-height: 1.25; }
      .pets-header {
        width: 100%;
        max-height: 180px;
        object-fit: contain;
        margin-bottom: 10px;
      }
      .pet-list-avatar {
        width: 48px;
        height: 48px;
        object-fit: contain;
      }
      .settings-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
      }
      .route-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }
      .route-title { font-size: 14px; color: var(--hint); }
      .bottom-bar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 20;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        min-height: 68px;
        padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
        background: var(--card);
        box-shadow: 0 -5px 20px rgba(0, 0, 0, .08);
        box-sizing: border-box;
      }
      .bottom-bar button {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
        border-top: 2px solid transparent;
        border-radius: 12px;
        font-size: 14px;
      }
      .bottom-bar button.active {
        color: var(--btn);
        border-top-color: var(--btn);
        background: color-mix(in srgb, var(--btn) 10%, var(--card));
      }
      .bottom-bar button.primary {
        background: var(--btn);
        color: var(--btnText);
        border-color: transparent;
        border-top-color: transparent;
        font-weight: 600;
      }
      @media (max-width: 460px) {
        .pet-name { font-size: 24px; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>PetPass 🐶🐱</h2>
      <div id="u" class="muted">Загрузка...</div>

      <div id="screenList">
        <img src="/assets/pets.png" class="pets-header" alt="PetPass" />
        <div id="pets"></div>
      </div>

      <div id="screenAdd" class="hidden">
        <h3>Добавить питомца</h3>
        <div id="createPetForm">
          <input id="petNameInput" class="field" type="text" placeholder="Имя питомца" maxlength="64" />
          <div class="row">
            <button id="dogTypeBtn" type="button" class="type-btn active">🐶 Собакен</button>
            <button id="catTypeBtn" type="button" class="type-btn">🐱 Котофей</button>
          </div>
          <div class="row">
            <button id="savePetBtn" type="button" class="primary">Сохранить</button>
          </div>
          <div id="formError" class="error"></div>
        </div>
      </div>

      <div id="screenPet" class="hidden"></div>
      <div id="screenSection" class="hidden"></div>
    </div>

    <div id="bottomBar" class="bottom-bar">
      <button data-go="#list">Питомцы</button>
      <button data-go="#add" class="primary">+ Добавить</button>
    </div>

    <script>
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();

      function applyTelegramTheme() {
        const theme = tg.themeParams || {};
        const root = document.documentElement;
        if (theme.bg_color) root.style.setProperty('--bg', theme.bg_color);
        if (theme.text_color) root.style.setProperty('--text', theme.text_color);
        if (theme.hint_color) root.style.setProperty('--hint', theme.hint_color);
        if (theme.button_color) root.style.setProperty('--btn', theme.button_color);
        if (theme.button_text_color) root.style.setProperty('--btnText', theme.button_text_color);
        if (theme.secondary_bg_color) {
          root.style.setProperty('--secondary-bg', theme.secondary_bg_color);
          root.style.setProperty('--card-bg', theme.secondary_bg_color);
        }
      }

      applyTelegramTheme();
      tg.onEvent('themeChanged', applyTelegramTheme);

      const user = tg.initDataUnsafe?.user;
      const tgInitData = tg.initData || '';

      const userEl = document.getElementById('u');
      const petsEl = document.getElementById('pets');
      const formEl = document.getElementById('createPetForm');
      const petNameInput = document.getElementById('petNameInput');
      const savePetBtn = document.getElementById('savePetBtn');
      const dogTypeBtn = document.getElementById('dogTypeBtn');
      const catTypeBtn = document.getElementById('catTypeBtn');
      const formErrorEl = document.getElementById('formError');
      const screenListEl = document.getElementById('screenList');
      const screenAddEl = document.getElementById('screenAdd');
      const screenPetEl = document.getElementById('screenPet');
      const screenSectionEl = document.getElementById('screenSection');
      const bottomBarEl = document.getElementById('bottomBar');

      const typeLabel = { dog: '🐶 Собакен', cat: '🐱 Котофей' };
      const sexLabel = { male: 'Самец', female: 'Самка', unknown: 'Неизвестно' };
      const sectionLabel = {
        info: 'Информация о питомце',
        vaccinations: 'Вакцинация',
        treatments: 'Обработка',
        weight: 'Вес',
        weights: 'Вес',
        walk: 'Прогулка',
        walks: 'Прогулка',
        events: 'События',
      };
      const typeImage = { dog: '/assets/dog.png', cat: '/assets/cat.png' };

      let selectedType = 'dog';
      let infoStatusTimer = null;
      let activeWalkTimer = null;

      function formatDateRu(isoDate) {
        if (!isoDate) return '';
        const [year, month, day] = String(isoDate).split('-');
        if (!year || !month || !day) return isoDate;
        return `${day}.${month}.${year}`;
      }

      function formatDateTimeRu(rawDateTime) {
        if (!rawDateTime) return '';
        const date = new Date(rawDateTime);
        if (Number.isNaN(date.getTime())) return String(rawDateTime);

        const day = String(date.getDate()).padStart(2, '0');
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const year = String(date.getFullYear());
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');

        return `${day}.${month}.${year} ${hours}:${minutes}`;
      }

      function formatDateShort(rawDate) {
        if (!rawDate) return '—';
        const value = String(rawDate);
        const datePart = value.includes('T') ? value.split('T')[0] : value;
        const [year, month, day] = datePart.split('-');
        if (!year || !month || !day) return value;
        return `${day}.${month}.${year}`;
      }

      function formatTimeOnly(rawDateTime) {
        if (!rawDateTime) return '';
        const date = new Date(rawDateTime);
        if (Number.isNaN(date.getTime())) return '';
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        return `${hours}:${minutes}`;
      }

      function formatDateTimeShort(rawDateTime) {
        if (!rawDateTime) return '—';
        const date = new Date(rawDateTime);
        if (!Number.isNaN(date.getTime())) {
          const day = String(date.getDate()).padStart(2, '0');
          const month = String(date.getMonth() + 1).padStart(2, '0');
          const hours = String(date.getHours()).padStart(2, '0');
          const minutes = String(date.getMinutes()).padStart(2, '0');
          return `${day}.${month} · ${hours}:${minutes}`;
        }

        const value = String(rawDateTime);
        if (!value.includes('T')) return formatDateShort(value).slice(0, 5);
        return value;
      }

      function formatDurationHms(totalSeconds) {
        const safeSeconds = Math.max(0, Math.floor(totalSeconds));
        const hours = String(Math.floor(safeSeconds / 3600)).padStart(2, '0');
        const minutes = String(Math.floor((safeSeconds % 3600) / 60)).padStart(2, '0');
        const seconds = String(safeSeconds % 60).padStart(2, '0');
        return `${hours}:${minutes}:${seconds}`;
      }

      function setType(type) {
        selectedType = type;
        dogTypeBtn.classList.toggle('active', type === 'dog');
        catTypeBtn.classList.toggle('active', type === 'cat');
      }

      function getApiHeaders() {
        const headers = {
          'Content-Type': 'application/json',
        };

        if (tgInitData) {
          headers['X-TG-INIT-DATA'] = tgInitData;
        } else if (user?.id) {
          headers['X-TG-USER-ID'] = String(user.id);
        }

        return headers;
      }

      function showScreen(screen) {
        screenListEl.classList.toggle('hidden', screen !== 'list');
        screenAddEl.classList.toggle('hidden', screen !== 'add');
        screenPetEl.classList.toggle('hidden', screen !== 'pet');
        screenSectionEl.classList.toggle('hidden', screen !== 'section');
      }

      function updateBottomBar(route, isPetRoute) {
        bottomBarEl.classList.toggle('hidden', isPetRoute);
        bottomBarEl.querySelectorAll('button[data-go]').forEach((btn) => {
          const target = btn.getAttribute('data-go');
          btn.classList.toggle('active', !isPetRoute && target === `#${route}`);
        });
      }

      function setHash(nextHash) {
        if (window.location.hash === nextHash) {
          renderRoute();
          return;
        }
        window.location.hash = nextHash;
      }

      function renderPets(pets) {
        if (!pets.length) {
          petsEl.innerHTML = '<p class="muted">Питомцев пока нет.</p>';
          return;
        }

        petsEl.innerHTML = pets
          .map((pet) => (
            `<div class="pet-card" data-pet-id="${pet.id}"><div class="row" style="margin-top:0;align-items:center;"><img src="${typeImage[pet.type] || typeImage.dog}" class="pet-list-avatar" alt="${pet.type}" /><div><strong>${pet.name}</strong><div class="pet-type">${typeLabel[pet.type] || pet.type}</div></div></div></div>`
          ))
          .join('');

        petsEl.querySelectorAll('.pet-card').forEach((cardEl) => {
          cardEl.addEventListener('click', () => {
            const petId = cardEl.getAttribute('data-pet-id');
            setHash(`#pet/${petId}`);
          });
        });
      }

      async function loadPets() {
        const response = await fetch('/api/pets', {
          method: 'GET',
          headers: getApiHeaders(),
        });

        if (!response.ok) {
          throw new Error('Не удалось получить список питомцев');
        }

        const data = await response.json();
        const pets = Array.isArray(data.pets) ? data.pets : [];
        renderPets(pets);
      }

      async function fetchPet(petId) {
        const response = await fetch(`/api/pets/${petId}`, {
          method: 'GET',
          headers: getApiHeaders(),
        });

        if (response.status === 404) {
          return null;
        }

        if (!response.ok) {
          throw new Error('Не удалось получить профиль питомца');
        }

        const data = await response.json();
        return data.pet || null;
      }

      async function fetchPetSummary(petId) {
        const response = await fetch(`/api/pets/${petId}/summary`, {
          method: 'GET',
          headers: getApiHeaders(),
        });

        if (response.status === 404) {
          return null;
        }

        if (!response.ok) {
          throw new Error('Не удалось получить сводку питомца');
        }

        return response.json();
      }

      function showDeleteConfirm(message) {
        return new Promise((resolve) => {
          if (typeof tg.showConfirm === 'function') {
            tg.showConfirm(message, (confirmed) => resolve(Boolean(confirmed)));
            return;
          }
          resolve(window.confirm(message));
        });
      }

      async function deletePet(petId) {
        const response = await fetch(`/api/pets/${petId}`, {
          method: 'DELETE',
          headers: getApiHeaders(),
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error || 'Не удалось удалить питомца');
        }

        return response.json();
      }

      function buildSummaryRows(summary) {
        const weight = summary.latest_weight
          ? `${Number(summary.latest_weight.weight).toFixed(1)} кг · ${formatDateShort(summary.latest_weight.date).slice(0, 5)}`
          : '—';
        const vaccination = summary.latest_vaccination
          ? `${summary.latest_vaccination.vaccine_name} · ${formatDateShort(summary.latest_vaccination.date_given).slice(0, 5)}`
          : '—';
        const fleas = summary.latest_treatment_fleas
          ? `${summary.latest_treatment_fleas.product_name} · ${formatDateShort(summary.latest_treatment_fleas.date_given).slice(0, 5)}`
          : '—';
        const worms = summary.latest_treatment_worms
          ? `${summary.latest_treatment_worms.product_name} · ${formatDateShort(summary.latest_treatment_worms.date_given).slice(0, 5)}`
          : '—';
        const walk = summary.latest_walk
          ? `${formatDateTimeShort(summary.latest_walk.started_at)} · ${summary.latest_walk.duration_min} мин`
          : '—';
        const event = summary.latest_event
          ? `${summary.latest_event.title} · ${formatDateTimeShort(summary.latest_event.event_date)}`
          : '—';

        return [
          ['⚖️', 'Вес', weight],
          ['💉', 'Вакцина', vaccination],
          ['🦟', 'Блохи', fleas],
          ['🪱', 'Глисты', worms],
          ['🐾', 'Прогулка', walk],
          ['🗓️', 'Событие', event],
        ];
      }

      function renderPetProfile(summary) {
        const pet = summary.pet;
        const heroClass = pet.type === 'cat' ? 'cat' : 'dog';
        const bannerImage = typeImage[pet.type] || typeImage.dog;
        const birthValue = pet.birth_date
          ? formatDateRu(pet.birth_date)
          : (pet.birth_year ? String(pet.birth_year) : '');
        const chips = [
          { text: typeLabel[pet.type] || pet.type, muted: false },
        ];

        if (pet.sex && pet.sex !== 'unknown') {
          chips.push({ text: `Пол: ${sexLabel[pet.sex] || pet.sex}`, muted: false });
        }

        if (birthValue) {
          chips.push({ text: `Рождение: ${birthValue}`, muted: false });
        }

        if (pet.chip_number) {
          chips.push({ text: `Чип: ${pet.chip_number}`, muted: false });
        }

        const chipsHtml = chips
          .map(({ text, muted }) => `<span class="chip${muted ? ' muted' : ''}">${text}</span>`)
          .join('');
        const summaryRows = buildSummaryRows(summary)
          .map(([icon, label, value]) => {
            const valueClass = value === '—' ? 'summary-value empty' : 'summary-value';
            return `<div class="summary-row"><div class="summary-left"><span class="summary-icon">${icon}</span><span class="summary-label">${label}</span></div><span class="${valueClass}">${value}</span></div>`;
          })
          .join('');

        screenPetEl.innerHTML = `
          <div class="pet-head">
            <div class="route-header"><button class="back-btn" id="backToListBtn">← Назад</button></div>
            <div class="row" style="margin-top:0;">
              <button class="icon-btn" id="editPetBtn" type="button">⚙️ Настройки</button>
            </div>
          </div>
          <div class="pet-hero ${heroClass}">
            <button class="pet-hero-menu" type="button" aria-hidden="true">⋯</button>
            <div class="pet-avatar-wrap"><img src="${bannerImage}" class="pet-avatar" alt="${pet.type}" /></div>
            <h3 class="pet-name">${pet.name}</h3>
            <div class="chips">${chipsHtml}</div>
          </div>

          <div class="summary-card">
            <div class="summary-title">Сводка</div>
            ${summaryRows}
          </div>

          <div class="action-grid">
            <button class="action" data-section="vaccinations"><span class="action-emoji">💉</span><span class="action-title">Вакцинация</span><span class="action-hint">Последние и будущие прививки</span></button>
            <button class="action" data-section="treatments"><span class="action-emoji">🧴</span><span class="action-title">Обработка</span><span class="action-hint">От блох и от глистов</span></button>
            <button class="action" data-section="weight"><span class="action-emoji">⚖️</span><span class="action-title">Вес</span><span class="action-hint">История и текущий вес</span></button>
            <button class="action" data-section="walks"><span class="action-emoji">🐾</span><span class="action-title">Прогулка</span><span class="action-hint">Таймер и журнал прогулок</span></button>
            <button class="action" data-section="events"><span class="action-emoji">🗂️</span><span class="action-title">События</span><span class="action-hint">Заметки и важные даты</span></button>
          </div>
        `;

        document.getElementById('backToListBtn').addEventListener('click', () => setHash('#list'));
        document.getElementById('editPetBtn').addEventListener('click', () => setHash(`#pet/${pet.id}/info`));

        screenPetEl.querySelectorAll('[data-section]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const section = btn.getAttribute('data-section');
            setHash(`#pet/${pet.id}/${section}`);
          });
        });
      }

      function renderSectionScreen(petId, section) {
        if (section === 'info') {
          renderPetInfoScreen(petId);
          return;
        }

        if (section === 'vaccination') {
          setHash(`#pet/${petId}/vaccinations`);
          return;
        }

        if (section === 'vaccinations') {
          renderVaccinationsScreen(petId);
          return;
        }

        if (section === 'treatment') {
          setHash(`#pet/${petId}/treatments`);
          return;
        }

        if (section === 'treatments' || section === 'treatments-fleas') {
          renderTreatmentsScreen(petId, 'fleas');
          return;
        }

        if (section === 'treatments-worms') {
          renderTreatmentsScreen(petId, 'worms');
          return;
        }

        if (section === 'weight') {
          setHash(`#pet/${petId}/weights`);
          return;
        }

        if (section === 'weights') {
          renderWeightsScreen(petId);
          return;
        }

        if (section === 'walk') {
          setHash(`#pet/${petId}/walks`);
          return;
        }

        if (section === 'walks') {
          renderWalksScreen(petId);

      async function savePetInfo(petId) {
        const saveBtn = document.getElementById('saveInfoBtn');
        const name = document.getElementById('infoNameInput').value.trim();
        const sex = document.getElementById('infoSexSelect').value;
        const chipNumberRaw = document.getElementById('infoChipInput').value.trim();
        const birthMode = document.querySelector('input[name="birthMode"]:checked')?.value || 'date';
        const birthDate = document.getElementById('infoBirthDate').value;
        const birthYearRaw = document.getElementById('infoBirthYear').value.trim();

        if (!name) {
          setInfoStatus('error', 'Имя обязательно для заполнения.');
          return;
        }

        const payload = {
          name,
          sex,
          birth_mode: birthMode,
          chip_number: chipNumberRaw || null,
        };

        if (birthMode === 'date') {
          if (!birthDate) {
            setInfoStatus('error', 'Укажите дату рождения.');
            return;
          }
          payload.birth_date = birthDate;
        } else {
          const birthYear = Number(birthYearRaw);
          if (!Number.isInteger(birthYear) || birthYear < 1900 || birthYear > 2100) {
            setInfoStatus('error', 'Год рождения должен быть от 1900 до 2100.');
            return;
          }
          payload.birth_year = birthYear;
        }

        saveBtn.disabled = true;
        try {
          const response = await fetch(`/api/pets/${petId}`, {
            method: 'PATCH',
            headers: getApiHeaders(),
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(errData.error || 'Не удалось сохранить изменения');
          }

          setInfoStatus('success', 'Сохранено ✅');
          setTimeout(() => setHash(`#pet/${petId}`), 800);
        } catch (error) {
          setInfoStatus('error', error.message || 'Ошибка сохранения. Попробуйте еще раз.');
        } finally {
          saveBtn.disabled = false;
        }
      }

          setInfoStatus('error', 'Не удалось загрузить данные питомца.');
        }
      }

      async function savePet() {
        formErrorEl.innerText = '';
        const name = petNameInput.value.trim();

        if (!name) {
          formErrorEl.innerText = 'Введите имя питомца';
          return;
        }

        savePetBtn.disabled = true;
        try {
          const response = await fetch('/api/pets', {
            method: 'POST',
            headers: getApiHeaders(),
            body: JSON.stringify({ name, type: selectedType }),
          });

          if (!response.ok) {
            throw new Error('Не удалось сохранить питомца');
          }

          petNameInput.value = '';
          setType('dog');
          await loadPets();
          const payload = await response.json().catch(() => ({}));
          const newPetId = payload.pet?.id || payload.id;
          if (newPetId) {
            setHash(`#pet/${newPetId}`);
            return;
          }
          setHash('#list');
        } catch (error) {
          formErrorEl.innerText = 'Ошибка сохранения. Попробуйте еще раз.';
        } finally {
          savePetBtn.disabled = false;
        }
      }

      async function renderRoute() {
        if (!tgInitData) {
          showScreen('list');
          return;
        }

        const hash = window.location.hash || '#list';
        const route = hash.replace(/^#/, '');

        const petRouteMatch = route.match(/^pet\/(\d+)(?:\/(.+))?$/);
        updateBottomBar(route, Boolean(petRouteMatch));

        if (route === 'list') {
          showScreen('list');
          return;
        }

        if (route === 'add') {
          showScreen('add');
          return;
        }

        if (!petRouteMatch) {
          setHash('#list');
          return;
        }

        const petId = petRouteMatch[1];
        const section = petRouteMatch[2];

        try {
          const petSummary = await fetchPetSummary(petId);
          if (!petSummary || !petSummary.pet) {
            setHash('#list');
            return;
          }

          if (section) {
            renderSectionScreen(petId, section);
            showScreen('section');
            return;
          }

          renderPetProfile(petSummary);
          showScreen('pet');
        } catch (error) {
          userEl.innerText = 'Не удалось загрузить экран питомца.';
          setHash('#list');
        }
      }

      async function bootstrap() {
        if (!tgInitData) {
          userEl.innerText = 'Открыто не из Telegram';
          renderPets([]);
          showScreen('list');
          return;
        }

        const firstName = user?.first_name || 'друг';
        userEl.innerText = `Привет, ${firstName}!`;

        try {
          await loadPets();
          if (!window.location.hash) {
            window.location.hash = '#list';
          }
          await renderRoute();
        } catch (error) {
          userEl.innerText = 'Сервер недоступен. Попробуйте позже.';
          renderPets([]);
          showScreen('list');
        }
      }

      bottomBarEl.querySelectorAll('button[data-go]').forEach((btn) => {
        btn.addEventListener('click', () => setHash(btn.getAttribute('data-go')));
      });
      dogTypeBtn.addEventListener('click', () => setType('dog'));
      catTypeBtn.addEventListener('click', () => setType('cat'));
      savePetBtn.addEventListener('click', savePet);
      window.addEventListener('hashchange', renderRoute);

      bootstrap();
    </script>
  </body>
</html>
