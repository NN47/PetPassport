<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PetPass</title>
    <link rel="preload" as="image" href="assets/loading-paw.svg" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --bg: var(--tg-theme-bg-color, #f6f7fb);
        --card: var(--tg-theme-secondary-bg-color, #ffffff);
        --text: var(--tg-theme-text-color, #111);
        --hint: var(--tg-theme-hint-color, #7a7a7a);
        --btn: var(--tg-theme-button-color, #2ea6ff);
        --btnText: var(--tg-theme-button-text-color, #fff);
        --secondary-bg: color-mix(in srgb, var(--card) 80%, var(--bg));
        --card-bg: var(--card);
        --border: color-mix(in srgb, var(--hint) 22%, transparent);
        --radius: 18px;
        --gap: 12px;
        --shadow: 0 10px 30px rgba(0, 0, 0, .06);
      }
      body { background: var(--bg); color: var(--text); margin: 0; font-family: system-ui, sans-serif; }
      .card { border-radius: calc(var(--radius) + 2px); padding: 16px 16px 24px; background: transparent; max-width: 520px; margin: 0 auto; box-sizing: border-box; }
      .card.with-bottom-bar { padding-bottom: calc(96px + env(safe-area-inset-bottom)); }
      input,
      textarea,
      select,
      button {
        font-size: 16px !important;
      }
      input,
      textarea,
      select {
        line-height: 1.2;
        transform: none !important;
        zoom: 1;
        -webkit-text-size-adjust: 100%;
      }
      textarea { resize: none; }
      .input,
      .textarea,
      .select,
      .field {
        font-size: 16px !important;
      }
      button { padding: 12px 14px; border-radius: 12px; border: 1px solid transparent; cursor: pointer; }
      .pet-card { border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-top: 10px; cursor: pointer; background: var(--card-bg); }
      .pet-type { font-size: 13px; color: var(--hint); }
      .primary { background: var(--btn); color: var(--btnText); }
      .muted { color: var(--hint); }
      .hidden { display: none; }
      .row { display: flex; gap: 8px; margin-top: 10px; }
      .type-btn { background: var(--secondary-bg); color: var(--text); }
      .type-btn.active { background: var(--btn); color: var(--btnText); }
      .field { width: 100%; box-sizing: border-box; margin-top: 10px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--card-bg); color: var(--text); }
      .error { color: #b42318; margin-top: 8px; font-size: 14px; }
      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--text);
        font-size: 16px;
        font-weight: 500;
      }
      .back-btn:hover {
        background: color-mix(in srgb, var(--btn) 8%, var(--card));
      }
      .back-btn:active {
        transform: translateY(1px);
      }
      .status { margin-top: 10px; padding: 10px 12px; border-radius: 10px; font-size: 14px; }
      .status.success { background: #e8f8ef; color: #0f5132; border: 1px solid #b7ebcc; }
      .status.error { background: #fdecec; color: #842029; border: 1px solid #f5c2c7; }
      .label { display: block; margin-top: 10px; margin-bottom: 4px; font-size: 14px; color: var(--text); }
      .birth-mode { display: flex; gap: 10px; margin-top: 8px; }
      .birth-mode label { display: flex; align-items: center; gap: 6px; font-size: 14px; }
      .summary-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px; margin-bottom: var(--gap); }
      .summary-title { font-weight: 700; margin-bottom: 10px; font-size: 15px; }
      .summary-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: center; padding: 6px 0; font-size: 14px; }
      .summary-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
      .summary-icon { font-size: 16px; width: 18px; text-align: center; }
      .summary-label { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .summary-value { color: var(--text); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .summary-value.empty { color: var(--hint); }
      .pet-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: var(--gap); }
      .icon-btn { background: var(--card); color: var(--text); padding: 8px 10px; font-size: 16px; border: 1px solid var(--border); }
      .danger-btn { background: color-mix(in srgb, #dc3545 18%, var(--card)); color: #b42318; border-color: color-mix(in srgb, #dc3545 36%, var(--border)); }
      .pet-hero { min-height: 160px; border-radius: var(--radius); background: linear-gradient(160deg, color-mix(in srgb, var(--btn) 22%, var(--card)) 0%, var(--card) 100%); box-shadow: var(--shadow); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; position: relative; text-align: center; margin-bottom: var(--gap); }
      .pet-hero.cat { background: linear-gradient(160deg, color-mix(in srgb, #ffbe7d 38%, var(--card)) 0%, var(--card) 100%); }
      .pet-hero-menu {
        position: absolute;
        right: 12px;
        top: 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 32px;
        padding: 6px 10px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--card) 94%, transparent);
        color: var(--text);
        border: 1px solid var(--border);
        font-size: 16px;
        font-weight: 600;
      }
      .pet-avatar-wrap { width: 72px; height: 72px; border-radius: 50%; background: var(--card); display: grid; place-items: center; box-shadow: 0 4px 14px rgba(0, 0, 0, .08); overflow: hidden; }
      .pet-avatar { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
      .pet-name { font-size: 28px; font-weight: 700; margin: 10px 0 6px; line-height: 1.1; }
      .chips { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 8px; margin-top: 10px; max-width: 100%; max-height: 72px; overflow: hidden; }
      .chip { padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,.65); backdrop-filter: blur(6px); font-size: 14px; line-height: 1; color: var(--text); }
      .chip.muted { color: var(--hint); background: color-mix(in srgb, var(--card) 80%, var(--hint) 20%); }
      .action-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--gap); }
      .action { min-height: 92px; background: var(--card); border-radius: var(--radius); box-shadow: 0 6px 20px rgba(0, 0, 0, .05); padding: 14px; text-align: left; color: var(--text); display: flex; flex-direction: column; gap: 5px; }
      .action-emoji { font-size: 18px; line-height: 1; }
      .action-title { font-size: 15px; font-weight: 600; }
      .action-hint { font-size: 12px; color: var(--hint); line-height: 1.25; }
      .pets-header {
        width: 100%;
        max-height: 180px;
        object-fit: contain;
        margin-bottom: 10px;
      }
      .add-pet-btn {
        width: 100%;
        margin-top: 10px;
        font-weight: 600;
      }
      .pet-list-avatar {
        width: 48px;
        height: 48px;
        object-fit: contain;
      }
      .loading-state {
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 28px 16px;
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        text-align: center;
      }
      .loading-image {
        width: 72px;
        height: 72px;
        object-fit: contain;
        animation: loadingPulse 1.2s ease-in-out infinite;
      }
      .loading-text {
        margin: 0;
        color: var(--hint);
        font-size: 14px;
      }
      .walk-hero {
        margin: 12px 0 16px;
        padding: 18px;
        border-radius: var(--radius);
        background: var(--card);
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
      }
      .walk-timer-value {
        font-size: 40px;
        font-weight: 700;
        letter-spacing: 0.03em;
        line-height: 1.1;
        margin: 0 0 14px;
      }
      .walk-timer-btn {
        width: 100%;
        min-height: 52px;
        font-size: 18px;
        font-weight: 700;
        border-radius: 14px;
      }
      .walk-metrics {
        margin-top: 14px;
        display: grid;
        gap: 8px;
      }
      .walk-metric-row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        font-size: 14px;
      }
      .walk-metric-label {
        color: var(--hint);
      }
      .walk-list-section-title {
        margin: 14px 0 8px;
        font-size: 16px;
        font-weight: 700;
      }
      .walk-compact-list {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--card);
        overflow: hidden;
      }
      .walk-compact-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: start;
        padding: 10px 12px;
        border-top: 1px solid var(--border);
      }
      .walk-compact-row:first-child {
        border-top: 0;
      }
      .walk-time-line {
        font-size: 14px;
        font-weight: 600;
      }
      .walk-notes {
        margin-top: 2px;
        font-size: 12px;
        color: var(--hint);
      }
      .walk-delete-btn {
        min-width: 32px;
        min-height: 32px;
        padding: 0;
        border-radius: 8px;
        background: transparent;
        color: var(--hint);
        border: 1px solid var(--border);
        font-size: 14px;
      }
      .health-hero {
        margin: 12px 0 16px;
        padding: 18px;
        border-radius: var(--radius);
        background: var(--card);
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
      }
      .health-hero-title {
        margin: 0;
        font-size: 14px;
        color: var(--hint);
      }
      .health-hero-value {
        margin: 8px 0 0;
        font-size: 26px;
        font-weight: 700;
        line-height: 1.2;
      }
      .health-hero-sub {
        margin: 8px 0 0;
        font-size: 13px;
        color: var(--hint);
      }
      .archive-block {
        margin-top: 12px;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--card);
      }
      .archive-toggle {
        width: 100%;
        text-align: left;
        background: var(--secondary-bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 12px;
        font-weight: 600;
      }
      .archive-toggle::marker,
      .archive-toggle::-webkit-details-marker {
        display: none;
      }
      .archive-day-title {
        margin: 14px 0 8px;
        font-size: 14px;
        font-weight: 700;
      }
      .ghost-btn {
        width: 100%;
        background: transparent;
        color: var(--text);
        border: 1px dashed var(--border);
        font-weight: 600;
      }
      @keyframes loadingPulse {
        0%,
        100% {
          transform: scale(1);
          opacity: .75;
        }
        50% {
          transform: scale(1.06);
          opacity: 1;
        }
      }
      .settings-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
      }
      .route-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }
      .route-title { font-size: 14px; color: var(--hint); }
      .calendar-shell {
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 14px;
      }
      .calendar-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }
      .calendar-month { font-size: 18px; font-weight: 700; }
      .calendar-nav {
        min-width: 36px;
        height: 36px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--secondary-bg);
        color: var(--text);
        padding: 0;
      }
      .calendar-weekdays,
      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 6px;
      }
      .calendar-weekday {
        text-align: center;
        font-size: 12px;
        color: var(--hint);
        font-weight: 600;
        padding: 4px 0;
      }
      .calendar-cell {
        min-height: 84px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 6px;
        background: color-mix(in srgb, var(--card) 88%, var(--secondary-bg));
        display: flex;
        flex-direction: column;
        gap: 4px;
        cursor: pointer;
      }
      .calendar-cell.selected-day {
        border-color: color-mix(in srgb, var(--btn) 50%, var(--border));
        box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--btn) 45%, transparent);
      }
      .calendar-cell.muted-day { opacity: .5; }
      .calendar-day-number { font-size: 12px; font-weight: 700; }
      .calendar-events {
        display: flex;
        flex-direction: column;
        gap: 3px;
        min-height: 0;
      }
      .calendar-icons {
        font-size: 16px;
        line-height: 1.2;
        letter-spacing: 1px;
        word-break: break-word;
      }
      .calendar-event {
        font-size: 11px;
        line-height: 1.25;
        border-radius: 6px;
        padding: 2px 4px;
        background: color-mix(in srgb, var(--btn) 12%, transparent);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .calendar-more { font-size: 11px; color: var(--hint); }
      .calendar-day-details {
        margin-top: 12px;
        border-top: 1px solid var(--border);
        padding-top: 12px;
      }
      .calendar-day-title {
        margin: 0 0 8px;
        font-size: 14px;
      }
      .bottomBar {
        position: fixed;
        width: 100%;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 30;
        padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
        background: rgba(255, 255, 255, .85);
        backdrop-filter: blur(12px);
        border-top: 1px solid rgba(0, 0, 0, .06);
        box-sizing: border-box;
      }
      .bottomBarInner {
        display: flex;
        gap: 10px;
        width: 100%;
        max-width: 520px;
        margin: 0 auto;
      }
      .btn {
        height: 46px;
        border-radius: 16px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 16px;
        border: 1px solid transparent;
        min-width: 0;
        width: 100%;
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .btnGhost {
        background: rgba(120, 120, 128, .12);
        color: #111;
        border: 1px solid rgba(0, 0, 0, .06);
      }
      .btnPrimary {
        background: linear-gradient(180deg, #2F8CFF, #1677FF);
        color: #fff;
        box-shadow: 0 10px 24px rgba(22, 119, 255, .22);
      }
      .btn .ico {
        line-height: 1;
        flex: 0 0 auto;
      }
      .btn .txt {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      @media (hover: hover) {
        .btnGhost:hover { background: rgba(100, 100, 108, .16); }
        .btnPrimary:hover { background: linear-gradient(180deg, #247EF3, #106EF2); }
      }
      .btnGhost:active,
      .btnPrimary:active {
        transform: translateY(1px);
      }
      .btn:disabled {
        opacity: .45;
        cursor: not-allowed;
      }
      @media (max-width: 460px) {
        .pet-name { font-size: 24px; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div id="u" class="muted hidden">Загрузка...</div>

      <div id="screenList">
        <img src="/assets/pets.png" class="pets-header" alt="PetPass" />
        <button id="addPetListBtn" class="primary add-pet-btn" type="button">+ Добавить питомца</button>
        <div id="pets"></div>
      </div>

      <div id="screenAdd" class="hidden">
        <h3>Добавить питомца</h3>
        <div id="createPetForm">
          <input id="petNameInput" class="field" type="text" placeholder="Имя питомца" maxlength="64" />
          <div class="row">
            <button id="dogTypeBtn" type="button" class="type-btn active">🐶 Собакен</button>
            <button id="catTypeBtn" type="button" class="type-btn">🐱 Котофей</button>
          </div>
          <div class="row">
            <button id="savePetBtn" type="button" class="primary">Сохранить</button>
          </div>
          <div id="formError" class="error"></div>
        </div>
      </div>

      <div id="screenPet" class="hidden"></div>
      <div id="screenSection" class="hidden"></div>
    </div>

    <div id="bottomBar" class="bottomBar hidden">
      <div class="bottomBarInner">
        <button class="btn btnGhost" id="btnBack" type="button"><span class="ico">←</span><span class="txt">Назад</span></button>
        <button class="btn btnPrimary" id="btnAddRecord" type="button"><span class="ico">📅</span><span class="txt">Календарь</span></button>
      </div>
    </div>

    <script>
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();

      function applyTelegramTheme() {
        const theme = tg.themeParams || {};
        const root = document.documentElement;
        if (theme.bg_color) root.style.setProperty('--bg', theme.bg_color);
        if (theme.text_color) root.style.setProperty('--text', theme.text_color);
        if (theme.hint_color) root.style.setProperty('--hint', theme.hint_color);
        if (theme.button_color) root.style.setProperty('--btn', theme.button_color);
        if (theme.button_text_color) root.style.setProperty('--btnText', theme.button_text_color);
        if (theme.secondary_bg_color) {
          root.style.setProperty('--secondary-bg', theme.secondary_bg_color);
          root.style.setProperty('--card-bg', theme.secondary_bg_color);
        }
      }

      applyTelegramTheme();
      tg.onEvent('themeChanged', applyTelegramTheme);

      const user = tg.initDataUnsafe?.user;
      const tgInitData = tg.initData || '';

      const userEl = document.getElementById('u');
      const petsEl = document.getElementById('pets');
      const addPetListBtn = document.getElementById('addPetListBtn');
      const formEl = document.getElementById('createPetForm');
      const petNameInput = document.getElementById('petNameInput');
      const savePetBtn = document.getElementById('savePetBtn');
      const dogTypeBtn = document.getElementById('dogTypeBtn');
      const catTypeBtn = document.getElementById('catTypeBtn');
      const formErrorEl = document.getElementById('formError');
      const screenListEl = document.getElementById('screenList');
      const screenAddEl = document.getElementById('screenAdd');
      const screenPetEl = document.getElementById('screenPet');
      const screenSectionEl = document.getElementById('screenSection');
      const cardEl = document.querySelector('.card');
      const bottomBarEl = document.getElementById('bottomBar');
      const btnBack = document.getElementById('btnBack');
      const btnAddRecord = document.getElementById('btnAddRecord');

      const typeLabel = { dog: '🐶 Собакен', cat: '🐱 Котофей' };
      const sexLabel = { male: 'Самец', female: 'Самка', unknown: 'Неизвестно' };
      const sectionLabel = {
        info: 'Информация о питомце',
        vaccinations: 'Вакцинация',
        treatments: 'Обработка',
        weight: 'Вес',
        weights: 'Вес',
        walk: 'Прогулка',
        walks: 'Прогулка',
        events: 'События',
        feedings: 'Питание',
        calendar: 'Календарь',
      };
      const typeImage = { dog: '/assets/dog.png', cat: '/assets/cat.png' };

      let selectedType = 'dog';
      let infoStatusTimer = null;
      let activeWalkTimer = null;
      const petCache = new Map();

      function formatDateRu(isoDate) {
        if (!isoDate) return '';
        const [year, month, day] = String(isoDate).split('-');
        if (!year || !month || !day) return isoDate;
        return `${day}.${month}.${year}`;
      }

      function formatDateTimeRu(rawDateTime) {
        if (!rawDateTime) return '';
        const date = new Date(rawDateTime);
        if (Number.isNaN(date.getTime())) return String(rawDateTime);

        const day = String(date.getDate()).padStart(2, '0');
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const year = String(date.getFullYear());
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');

        return `${day}.${month}.${year} ${hours}:${minutes}`;
      }

      function formatDateShort(rawDate) {
        if (!rawDate) return '—';
        const value = String(rawDate);
        const datePart = value.includes('T') ? value.split('T')[0] : value;
        const [year, month, day] = datePart.split('-');
        if (!year || !month || !day) return value;
        return `${day}.${month}.${year}`;
      }

      function formatTimeOnly(rawDateTime) {
        if (!rawDateTime) return '';
        const date = new Date(rawDateTime);
        if (Number.isNaN(date.getTime())) return '';
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        return `${hours}:${minutes}`;
      }

      function formatDateTimeShort(rawDateTime) {
        if (!rawDateTime) return '—';
        const date = new Date(rawDateTime);
        if (!Number.isNaN(date.getTime())) {
          const day = String(date.getDate()).padStart(2, '0');
          const month = String(date.getMonth() + 1).padStart(2, '0');
          const hours = String(date.getHours()).padStart(2, '0');
          const minutes = String(date.getMinutes()).padStart(2, '0');
          return `${day}.${month} · ${hours}:${minutes}`;
        }

        const value = String(rawDateTime);
        if (!value.includes('T')) return formatDateShort(value).slice(0, 5);
        return value;
      }

      function formatDurationHms(totalSeconds) {
        const safeSeconds = Math.max(0, Math.floor(totalSeconds));
        const hours = String(Math.floor(safeSeconds / 3600)).padStart(2, '0');
        const minutes = String(Math.floor((safeSeconds % 3600) / 60)).padStart(2, '0');
        const seconds = String(safeSeconds % 60).padStart(2, '0');
        return `${hours}:${minutes}:${seconds}`;
      }

      function getDateKey(rawDateTime) {
        if (!rawDateTime) return null;
        const date = new Date(rawDateTime);
        if (Number.isNaN(date.getTime())) return null;
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      }

      function formatMinutesDuration(totalMinutes) {
        const safeMinutes = Math.max(0, Math.floor(totalMinutes));
        const hours = Math.floor(safeMinutes / 60);
        const minutes = safeMinutes % 60;
        if (hours > 0) {
          return `${hours} ч ${String(minutes).padStart(2, '0')} мин`;
        }
        return `${minutes} мин`;
      }

          'Content-Type': 'application/json',
        };

        if (tgInitData) {
          headers['X-TG-INIT-DATA'] = tgInitData;
        } else if (user?.id) {
          headers['X-TG-USER-ID'] = String(user.id);
        }

        return headers;

          method: 'GET',
          headers: getApiHeaders(),
        });

        if (!response.ok) {
          throw new Error('Не удалось получить список питомцев');

        const pets = Array.isArray(data.pets) ? data.pets : [];
        renderPets(pets);

      async function api_get_pet(petId, options = {}) {
        const { force = false } = options;
        const cacheKey = String(petId);

        if (!force && petCache.has(cacheKey)) {
          return petCache.get(cacheKey);
        }

        const response = await fetch(`/api/pets/${petId}`, {
          method: 'GET',
          headers: getApiHeaders(),
        });

        if (response.status === 404) {
          return null;
        }

        if (!response.ok) {
          throw new Error('Не удалось получить профиль питомца');
        }

        const data = await response.json();
        const pet = data.pet || null;
        if (pet) {
          petCache.set(cacheKey, pet);
        } else {
          petCache.delete(cacheKey);
        }
        return pet;
      }

        const response = await fetch(`/api/pets/${petId}/summary`, {
          method: 'GET',
          headers: getApiHeaders(),
        });

        if (response.status === 404) {
          return null;
        }

        if (!response.ok) {
          throw new Error('Не удалось получить сводку питомца');

      function showDeleteConfirm(message) {
        return new Promise((resolve) => {
          if (typeof tg.showConfirm === 'function') {
            tg.showConfirm(message, (confirmed) => resolve(Boolean(confirmed)));
            return;
          }
          resolve(window.confirm(message));
        });
      }

      async function deletePet(petId) {
        const response = await fetch(`/api/pets/${petId}`, {
          method: 'DELETE',
          headers: getApiHeaders(),
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error || 'Не удалось удалить питомца');
        }

      function buildSummaryRows(summary) {
        function isToday(value) {
          if (!value) return false;
          const parsed = new Date(value);
          if (Number.isNaN(parsed.getTime())) return false;

          const now = new Date();
          return parsed.getFullYear() === now.getFullYear()
            && parsed.getMonth() === now.getMonth()
            && parsed.getDate() === now.getDate();
        }

        const weight = summary.latest_weight
          ? `${Number(summary.latest_weight.weight).toFixed(1)} кг · ${formatDateShort(summary.latest_weight.date).slice(0, 5)}`
          : '—';
        const vaccination = summary.latest_vaccination
          ? `${summary.latest_vaccination.vaccine_name} · ${formatDateShort(summary.latest_vaccination.date_given).slice(0, 5)}`
          : '—';
        const fleas = summary.latest_treatment_fleas
          ? `${summary.latest_treatment_fleas.product_name} · ${formatDateShort(summary.latest_treatment_fleas.date_given).slice(0, 5)}`
          : '—';
        const worms = summary.latest_treatment_worms
          ? `${summary.latest_treatment_worms.product_name} · ${formatDateShort(summary.latest_treatment_worms.date_given).slice(0, 5)}`
          : '—';
        const walk = summary.latest_walk && isToday(summary.latest_walk.started_at)
          ? `${formatDateTimeShort(summary.latest_walk.started_at)} · ${summary.latest_walk.duration_min} мин`
          : '—';
        const event = summary.latest_event && isToday(summary.latest_event.event_date)
          ? `${summary.latest_event.title} · ${formatDateTimeShort(summary.latest_event.event_date)}`
          : '—';
        const feeding = summary.latest_feeding && isToday(summary.latest_feeding.fed_at)
          ? `${formatDateTimeShort(summary.latest_feeding.fed_at)}`
          : '—';

        return [
          ['⚖️', 'Вес', weight],
          ['💉', 'Вакцина', vaccination],
          ['🦟', 'Блохи', fleas],
          ['🪱', 'Глисты', worms],
          ['🐾', 'Прогулка', walk],
          ['🗓️', 'Событие', event],
          ['🍽️', 'Питание', feeding],
        ];
      }

      function renderPetProfile(pet, summary) {
        console.log('pet(full)', pet);
        const heroClass = pet.type === 'cat' ? 'cat' : 'dog';
        const bannerImage = typeImage[pet.type] || typeImage.dog;
        function getPetAgeValue(currentPet) {
          const now = new Date();

          if (currentPet.birth_date) {
            const birthDate = new Date(`${currentPet.birth_date}T00:00:00`);
            if (Number.isNaN(birthDate.getTime()) || birthDate > now) return '';

            let years = now.getFullYear() - birthDate.getFullYear();
            const monthDelta = now.getMonth() - birthDate.getMonth();
            const dayDelta = now.getDate() - birthDate.getDate();
            if (monthDelta < 0 || (monthDelta === 0 && dayDelta < 0)) {
              years -= 1;
            }
            return years < 1 ? 'до 1 года' : `${years} г.`;
          }

          if (currentPet.birth_year) {
            const years = now.getFullYear() - Number(currentPet.birth_year);
            if (Number.isNaN(years) || years < 0) return '';
            return years < 1 ? 'до 1 года' : `${years} г.`;
          }

          return '';
        }

        const ageValue = getPetAgeValue(pet);
        function isEmpty(v) {
          if (v === null || v === undefined) return true;
          const normalized = String(v).trim().toLowerCase();
          return !normalized || normalized === '—' || normalized === 'unknown' || normalized === 'неизвестно';
        }

        function chip(label, value, icon) {
          const empty = isEmpty(value);
          const fallback = {
            'Пол': 'не указан',
            'Возраст': 'не указан',
            'Чип': 'не указан',
          };

          if (label === 'Чип' && empty) {
            return null;
          }

          if (label === 'Тип') {
            const typeText = String(value || '').trim();
            return { text: `${icon ? `${icon} ` : ''}${typeText}`.trim(), muted: false };
          }

          const safeValue = empty ? fallback[label] : String(value).trim();
          return {
            text: `${icon ? `${icon} ` : ''}${label}: ${safeValue}`,
            muted: empty,
          };
        }

        const chips = [
          chip('Тип', typeLabel[pet.type] || pet.type, ''),
          chip('Пол', sexLabel[pet.sex] || pet.sex, '⚥'),
          chip('Возраст', ageValue, '🎂'),
          chip('Чип', pet.chip_number, '🏷️'),
        ];

        const chipsHtml = chips
          .filter(Boolean)
          .map(({ text, muted }) => `<span class="chip${muted ? ' muted' : ''}">${text}</span>`)
          .join('');
        const summaryRows = buildSummaryRows(summary)
          .map(([icon, label, value]) => {
            const valueClass = value === '—' ? 'summary-value empty' : 'summary-value';
            return `<div class="summary-row"><div class="summary-left"><span class="summary-icon">${icon}</span><span class="summary-label">${label}</span></div><span class="${valueClass}">${value}</span></div>`;
          })
          .join('');

        screenPetEl.innerHTML = `
          <div class="pet-hero ${heroClass}">
            <button class="pet-hero-menu" id="editPetBtn" type="button">⚙️ Настройки</button>
            <div class="pet-avatar-wrap"><img src="${bannerImage}" class="pet-avatar" alt="${pet.type}" /></div>
            <h3 class="pet-name">${pet.name}</h3>
            <div class="chips">${chipsHtml}</div>
          </div>

          <div class="summary-card">
            <div class="summary-title">Сводка</div>
            ${summaryRows}
          </div>

          <div class="action-grid">
            <button class="action" data-section="vaccinations"><span class="action-emoji">💉</span><span class="action-title">Вакцинация</span><span class="action-hint">Последние и будущие прививки</span></button>
            <button class="action" data-section="treatments"><span class="action-emoji">🧴</span><span class="action-title">Обработка</span><span class="action-hint">От блох и от глистов</span></button>
            <button class="action" data-section="weight"><span class="action-emoji">⚖️</span><span class="action-title">Вес</span><span class="action-hint">История и текущий вес</span></button>
            <button class="action" data-section="walks"><span class="action-emoji">🐾</span><span class="action-title">Прогулка</span><span class="action-hint">Таймер и журнал прогулок</span></button>
            <button class="action" data-section="events"><span class="action-emoji">🗂️</span><span class="action-title">События</span><span class="action-hint">Заметки и важные даты</span></button>
            <button class="action" data-section="feedings"><span class="action-emoji">🍽️</span><span class="action-title">Питание</span><span class="action-hint">Отметки о кормлении</span></button>
          </div>
        `;

        document.getElementById('editPetBtn').addEventListener('click', () => setHash(`#pet/${pet.id}/info`));

        screenPetEl.querySelectorAll('[data-section]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const section = btn.getAttribute('data-section');
            setHash(`#pet/${pet.id}/${section}`);
          });
        });
      }

      async function fetchVaccinations(petId) {
        const response = await fetch(`/api/pets/${petId}/vaccinations`, {
          method: 'GET',
          headers: getApiHeaders(),
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          const error = new Error(errData.error || 'Не удалось загрузить вакцинации');
          error.status = response.status;
          throw error;
        }

        const data = await response.json();
        return Array.isArray(data.vaccinations) ? data.vaccinations : [];
      }

      async function createVaccination(petId, payload) {
        const response = await fetch(`/api/pets/${petId}/vaccinations`, {
          method: 'POST',
          headers: getApiHeaders(),
          body: JSON.stringify(payload),
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          const error = new Error(errData.error || 'Не удалось сохранить вакцинацию');
          error.status = response.status;
          throw error;
        }

        return response.json();
      }

      async function deleteVaccination(petId, vaccinationId) {
        const response = await fetch(`/api/pets/${petId}/vaccinations/${vaccinationId}`, {
          method: 'DELETE',
          headers: getApiHeaders(),
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          const error = new Error(errData.error || 'Не удалось удалить вакцинацию');
          error.status = response.status;
          throw error;
        }
      }

      function setVaccinationStatus(type, message) {
        const statusEl = document.getElementById('vaccinationStatus');
        if (!statusEl) return;
        statusEl.className = `status ${type}`;
        statusEl.innerText = message;
        statusEl.classList.remove('hidden');
      }

      function hideVaccinationStatus() {
        const statusEl = document.getElementById('vaccinationStatus');
        if (!statusEl) return;
        statusEl.classList.add('hidden');
      }

      function renderVaccinationsList(vaccinations) {
        const listEl = document.getElementById('vaccinationsList');
        const latestEl = document.getElementById('vaccinationLatestValue');
        const dueEl = document.getElementById('vaccinationDueValue');
        if (!listEl) return;

        const latest = vaccinations[0] || null;
        const upcoming = vaccinations
          .filter((item) => item.next_due)
          .sort((a, b) => String(a.next_due).localeCompare(String(b.next_due)))[0] || null;

        if (latestEl) {
          latestEl.innerText = latest
            ? `${latest.vaccine_name} · ${formatDateRu(latest.date_given)}`
            : 'Записей пока нет';
        }
        if (dueEl) {
          dueEl.innerText = upcoming
            ? formatDateRu(upcoming.next_due)
            : 'Не запланировано';
        }

        if (!vaccinations.length) {
          listEl.innerHTML = '<p class="muted">Записей вакцинации пока нет.</p>';
          return;
        }

        listEl.innerHTML = vaccinations
          .map((item) => {
            const nextDueText = item.next_due
              ? `<div class="walk-notes">Следующая: ${formatDateRu(item.next_due)}</div>`
              : '';
            const notesText = item.notes
              ? `<div class="walk-notes">Заметка: ${item.notes}</div>`
              : '';

            return `
              <div class="walk-compact-row">
                <div>
                  <div class="walk-time-line">${formatDateRu(item.date_given)} — ${item.vaccine_name}</div>
                  ${nextDueText}
                  ${notesText}
                </div>
                <button class="walk-delete-btn" data-delete-vaccination-id="${item.id}" type="button" aria-label="Удалить запись">🗑</button>
              </div>
            `;
          })
          .join('');

        listEl.innerHTML = `<div class="walk-compact-list">${listEl.innerHTML}</div>`;
      }

      async function refreshVaccinations(petId) {
        const vaccinations = await fetchVaccinations(petId);
        renderVaccinationsList(vaccinations);
      }

      function resetVaccinationForm() {
        document.getElementById('vaccVaccineName').value = '';
        document.getElementById('vaccDateGiven').value = '';
        document.getElementById('vaccNextDue').value = '';
        document.getElementById('vaccNotes').value = '';
      }

      function toggleVaccinationForm(show) {
        const formEl = document.getElementById('vaccinationForm');
        const addBtn = document.getElementById('showVaccinationFormBtn');
        if (!formEl || !addBtn) return;
        formEl.classList.toggle('hidden', !show);
        addBtn.classList.toggle('hidden', show);
      }

      async function renderVaccinationsScreen(petId) {
        screenSectionEl.innerHTML = `
          <div><button class="back-btn" id="backToProfileBtn">← Назад</button></div>
          <h3 style="margin: 12px 0 0;">Вакцинация</h3>
          <div id="vaccinationStatus" class="status hidden"></div>

          <div class="health-hero">
            <p class="health-hero-title">Последняя вакцинация</p>
            <p id="vaccinationLatestValue" class="health-hero-value">Записей пока нет</p>
            <p class="health-hero-sub">Ближайшая следующая: <strong id="vaccinationDueValue">Не запланировано</strong></p>
          </div>

          <h4 class="walk-list-section-title">История вакцинаций</h4>
          <div id="vaccinationsList"></div>

          <div class="row">
            <button id="showVaccinationFormBtn" type="button" class="ghost-btn">Добавить запись</button>
          </div>

          <div id="vaccinationForm" class="hidden">
            <label class="label" for="vaccVaccineName">Название вакцины</label>
            <input id="vaccVaccineName" class="field" type="text" maxlength="128" />

            <label class="label" for="vaccDateGiven">Дата вакцинации</label>
            <input id="vaccDateGiven" class="field" type="date" />

            <label class="label" for="vaccNextDue">Следующая вакцинация (опционально)</label>
            <input id="vaccNextDue" class="field" type="date" />

            <label class="label" for="vaccNotes">Заметка (опционально)</label>
            <textarea id="vaccNotes" class="field" rows="3" maxlength="500"></textarea>

            <div class="row">
              <button id="saveVaccinationBtn" type="button" class="primary">Сохранить</button>
              <button id="cancelVaccinationBtn" type="button" class="back-btn">Отмена</button>
            </div>
          </div>
        `;

        document.getElementById('backToProfileBtn').addEventListener('click', () => setHash(`#pet/${petId}`));
        document.getElementById('showVaccinationFormBtn').addEventListener('click', () => {
          hideVaccinationStatus();
          toggleVaccinationForm(true);
        });

        document.getElementById('cancelVaccinationBtn').addEventListener('click', () => {
          resetVaccinationForm();
          hideVaccinationStatus();
          toggleVaccinationForm(false);
        });

        document.getElementById('vaccinationsList').addEventListener('click', async (event) => {
          const deleteBtn = event.target.closest('[data-delete-vaccination-id]');
          if (!deleteBtn) return;

          const confirmed = await showDeleteConfirm('Удалить запись вакцинации?');
          if (!confirmed) return;

          const vaccinationId = Number(deleteBtn.getAttribute('data-delete-vaccination-id'));
          if (!Number.isFinite(vaccinationId)) return;

          deleteBtn.disabled = true;
          try {
            await deleteVaccination(petId, vaccinationId);
            setVaccinationStatus('success', 'Запись вакцинации удалена ✅');
            await refreshVaccinations(petId);
          } catch (error) {
            const statusCodeText = error.status ? ` (${error.status})` : '';
            setVaccinationStatus('error', `Ошибка${statusCodeText}: ${error.message || 'не удалось удалить запись.'}`);
            deleteBtn.disabled = false;
          }
        });

        document.getElementById('saveVaccinationBtn').addEventListener('click', async () => {
          const saveBtn = document.getElementById('saveVaccinationBtn');
          const vaccineName = document.getElementById('vaccVaccineName').value.trim();
          const dateGiven = document.getElementById('vaccDateGiven').value;
          const nextDue = document.getElementById('vaccNextDue').value;
          const notes = document.getElementById('vaccNotes').value.trim();

          if (!vaccineName) {
            setVaccinationStatus('error', 'Укажите название вакцины.');
            return;
          }
          if (!dateGiven) {
            setVaccinationStatus('error', 'Укажите дату вакцинации.');
            return;
          }

          const payload = {
            vaccine_name: vaccineName,
            date_given: dateGiven,
            next_due: nextDue || null,
            notes: notes || null,
          };

          saveBtn.disabled = true;
          try {
            await createVaccination(petId, payload);
            setVaccinationStatus('success', 'Вакцинация сохранена ✅');
            resetVaccinationForm();
            toggleVaccinationForm(false);
            await refreshVaccinations(petId);
          } catch (error) {
            const statusCodeText = error.status ? ` (${error.status})` : '';
            setVaccinationStatus('error', `Ошибка${statusCodeText}: ${error.message || 'не удалось сохранить запись.'}`);
          } finally {
            saveBtn.disabled = false;
          }
        });

        try {
          await refreshVaccinations(petId);
        } catch (error) {
          const statusCodeText = error.status ? ` (${error.status})` : '';
          setVaccinationStatus('error', `Ошибка${statusCodeText}: ${error.message || 'не удалось загрузить список вакцинаций.'}`);
          renderVaccinationsList([]);
        }
      }

      async function fetchTreatments(petId, treatmentType) {
        const response = await fetch(`/api/pets/${petId}/treatments?type=${encodeURIComponent(treatmentType)}`, {
          method: 'GET',
          headers: getApiHeaders(),
        });

      function renderWalksList(walks) {
        const listEl = document.getElementById('walksList');
        const todayMinutesEl = document.getElementById('walkTodayMinutes');
        const latestWalkEl = document.getElementById('walkLatestValue');
        if (!listEl) return;

        const todayKey = getDateKey(new Date().toISOString());
        const todayWalks = [];
        const archiveByDay = new Map();

        walks.forEach((walk) => {
          const walkDayKey = getDateKey(walk.started_at);
          if (!walkDayKey || walkDayKey === todayKey) {
            todayWalks.push(walk);
            return;
          }
          if (!archiveByDay.has(walkDayKey)) archiveByDay.set(walkDayKey, []);
          archiveByDay.get(walkDayKey).push(walk);
        });

        const renderWalkRow = (walk) => {
          const notesText = walk.notes ? `<div class="walk-notes">${walk.notes}</div>` : '';
          return `
            <div class="walk-compact-row">
              <div>
                <div class="walk-time-line">${formatTimeOnly(walk.started_at)} — ${walk.duration_min} мин</div>
                ${notesText}
              </div>
              <button class="walk-delete-btn" data-delete-walk-id="${walk.id}" type="button" aria-label="Удалить запись">🗑</button>
            </div>
          `;
        };

        const todayTotalMinutes = todayWalks.reduce((sum, walk) => sum + (Number(walk.duration_min) || 0), 0);
        if (todayMinutesEl) {
          todayMinutesEl.innerText = formatMinutesDuration(todayTotalMinutes);
        }

        const latestWalk = walks[0];
        if (latestWalkEl) {
          latestWalkEl.innerText = latestWalk
            ? `${formatTimeOnly(latestWalk.started_at)} — ${latestWalk.duration_min} мин`
            : '—';
        }

        const todayContent = todayWalks.length
          ? `<div class="walk-compact-list">${todayWalks.map(renderWalkRow).join('')}</div>`
          : '<p class="muted">Сегодня прогулок пока нет.</p>';

        const archiveDays = Array.from(archiveByDay.keys()).sort((a, b) => b.localeCompare(a));
        const archiveContent = archiveDays.length
          ? archiveDays
            .map((dayKey) => {
              const dayWalks = archiveByDay.get(dayKey) || [];
              const dayTotalMinutes = dayWalks.reduce((sum, walk) => sum + (Number(walk.duration_min) || 0), 0);
              return `
                <div>
                  <h4 class="archive-day-title">${formatDateRu(dayKey)} · ${formatMinutesDuration(dayTotalMinutes)}</h4>
                  <div class="walk-compact-list">${dayWalks.map(renderWalkRow).join('')}</div>
                </div>
              `;
            })
            .join('')
          : '<p class="muted">Архив пуст.</p>';

        listEl.innerHTML = `
          <h4 class="walk-list-section-title">Сегодня</h4>
          ${todayContent}
          <div class="archive-block">
            <h4 class="walk-list-section-title" style="margin-top: 0;">История</h4>
            <details>
              <summary class="archive-toggle">Показать архив по дням</summary>
              ${archiveContent}
            </details>
          </div>
        `;
      }

        const syncTimerUi = () => {
          const isRunning = activeWalkTimer && activeWalkTimer.petId === petId && activeWalkTimer.startMs;
          if (!isRunning) {
            timerValueEl.innerText = '00:00:00';
            timerBtn.innerText = '▶ Старт';
            return;
          }

          const elapsedSec = Math.floor((Date.now() - activeWalkTimer.startMs) / 1000);
          timerValueEl.innerText = formatDurationHms(elapsedSec);
          timerBtn.innerText = '■ Стоп';
        };

        const startTimer = () => {
          stopActiveWalkTimer(true);
          activeWalkTimer = {
            petId,
            startMs: Date.now(),
            startedAtIso: new Date().toISOString(),
            intervalId: null,
          };

          syncTimerUi();
          activeWalkTimer.intervalId = setInterval(syncTimerUi, 1000);
          hideWalkStatus();
        };

        const stopTimerAndSave = async () => {
          if (!activeWalkTimer || activeWalkTimer.petId !== petId || !activeWalkTimer.startMs) {
            return;
          }

          const elapsedSec = Math.floor((Date.now() - activeWalkTimer.startMs) / 1000);
          const durationMin = Math.max(1, Math.round(elapsedSec / 60));
          const startedAt = activeWalkTimer.startedAtIso;

          timerBtn.disabled = true;
          try {
            await createWalk(petId, {
              started_at: startedAt,
              duration_min: durationMin,
            });
            setWalkStatus('success', 'Прогулка сохранена ✅');
            stopActiveWalkTimer(true);
            syncTimerUi();
            await refreshWalks();
          } catch (error) {
            const statusCodeText = error.status ? ` (${error.status})` : '';
            setWalkStatus('error', `Ошибка${statusCodeText}: ${error.message || 'не удалось сохранить прогулку.'}`);
          } finally {
            timerBtn.disabled = false;
          }

            const statusCodeText = error.status ? ` (${error.status})` : '';

            deleteBtn.disabled = false;

        document.getElementById('cancelWalkBtn').addEventListener('click', () => {
          resetWalkForm();
          hideWalkStatus();
          toggleWalkForm(false);
        });

          const startedAtLocal = document.getElementById('walkStartedAt').value;
          const durationRaw = document.getElementById('walkDurationMin').value;
          const notes = document.getElementById('walkNotes').value.trim();

          if (!startedAtLocal) {
            setWalkStatus('error', 'Укажите дату и время начала прогулки.');
            return;
          }

          const durationMin = Number(durationRaw);
          if (!Number.isInteger(durationMin) || durationMin <= 0) {
            setWalkStatus('error', 'Укажите корректную длительность в минутах.');
            return;
          }

          saveBtn.disabled = true;
          try {
            await createWalk(petId, {
              started_at: startedAtLocal,
              duration_min: durationMin,
              notes: notes || null,
            });
            setWalkStatus('success', 'Прогулка добавлена ✅');
            resetWalkForm();
            toggleWalkForm(false);
            await refreshWalks();
          } catch (error) {
            const statusCodeText = error.status ? ` (${error.status})` : '';
            setWalkStatus('error', `Ошибка${statusCodeText}: ${error.message || 'не удалось сохранить прогулку.'}`);
          } finally {
            saveBtn.disabled = false;
          }
        });

        timerBtn.addEventListener('click', async () => {
          const isRunning = activeWalkTimer && activeWalkTimer.petId === petId && activeWalkTimer.startMs;
          if (isRunning) {
            await stopTimerAndSave();
            return;
          }
          startTimer();
        });

        if (activeWalkTimer && activeWalkTimer.petId !== petId) {
          stopActiveWalkTimer(true);
        }

        syncTimerUi();
        if (activeWalkTimer && activeWalkTimer.petId === petId && !activeWalkTimer.intervalId) {
          activeWalkTimer.intervalId = setInterval(syncTimerUi, 1000);
        }

        try {
          await refreshWalks();
        } catch (error) {
          const statusCodeText = error.status ? ` (${error.status})` : '';
          setWalkStatus('error', `Ошибка${statusCodeText}: ${error.message || 'не удалось загрузить список прогулок.'}`);
          renderWalksList([]);
        }
      }

      async function renderCalendarScreen(petId) {
        screenSectionEl.innerHTML = `
          <div class="row"><button class="back-btn" id="backToProfileBtn" type="button">← Назад</button></div>
          <div class="route-header"><span class="route-title">Календарь</span></div>
          <div id="calendarStatus" class="status hidden"></div>
          <div id="calendarList" class="calendar-shell"><div class="muted">Загрузка календаря...</div></div>
        `;

        document.getElementById('backToProfileBtn').addEventListener('click', () => setHash(`#pet/${petId}`));

        const listEl = document.getElementById('calendarList');
        const statusEl = document.getElementById('calendarStatus');

        try {
          const [vaccinations, fleas, worms, weights, walks, events, feedings] = await Promise.all([
            fetchVaccinations(petId),
            fetchTreatments(petId, 'fleas'),
            fetchTreatments(petId, 'worms'),
            fetchWeights(petId),
            fetchWalks(petId),
            fetchEvents(petId),
            fetchFeedings(petId),
          ]);

          const records = [
            ...vaccinations.map((item) => ({ date: item.date_given, title: `💉 ${item.vaccine_name || 'Вакцинация'}`, emoji: '💉' })),
            ...fleas.map((item) => ({ date: item.date_given, title: `🧴 ${item.product_name || 'Обработка от блох'}`, emoji: '🧴' })),
            ...worms.map((item) => ({ date: item.date_given, title: `🧴 ${item.product_name || 'Обработка от глистов'}`, emoji: '🧴' })),
            ...weights.map((item) => ({ date: item.measured_at, title: `⚖️ Вес ${Number(item.weight).toFixed(1)} кг`, emoji: '⚖️' })),
            ...walks.map((item) => ({ date: item.started_at, title: `🐾 Прогулка ${item.duration_min} мин`, emoji: '🐾' })),
            ...events.map((item) => ({ date: item.event_date, title: `🗂️ ${item.title || 'Событие'}`, emoji: '🗂️' })),
            ...feedings.map((item) => ({ date: item.fed_at, title: '🍽️ Кормление', emoji: '🍽️' })),
          ]
            .map((item) => {
              if (!item.date) return null;
              const ts = new Date(item.date).getTime();
              if (!Number.isFinite(ts)) return null;
              return { ...item, ts, dateObj: new Date(ts) };
            })
            .filter(Boolean)
            .sort((a, b) => b.ts - a.ts);

          if (!records.length) {
            listEl.innerHTML = '<div class="muted">Пока нет записей для календаря.</div>';
            return;
          }

          const weekdays = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
          const monthNames = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
          let monthOffset = 0;
          let selectedDateKey = null;

          const toDateKey = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
          const groupedByDay = records.reduce((acc, item) => {
            const key = toDateKey(item.dateObj);
            if (!acc.has(key)) acc.set(key, []);
            acc.get(key).push(item);
            return acc;
          }, new Map());

          function formatDateLong(dateKey) {
            const [year, month, day] = dateKey.split('-');
            return `${day}.${month}.${year}`;
          }

          function buildCalendarGrid(baseDate) {
            const year = baseDate.getFullYear();
            const month = baseDate.getMonth();
            const firstDay = new Date(year, month, 1);
            const firstWeekday = (firstDay.getDay() + 6) % 7;
            const gridStart = new Date(year, month, 1 - firstWeekday);

            const cells = [];
            for (let i = 0; i < 42; i += 1) {
              const dayDate = new Date(gridStart.getFullYear(), gridStart.getMonth(), gridStart.getDate() + i);
              const inCurrentMonth = dayDate.getMonth() === month;
              const dayKey = toDateKey(dayDate);
              const dayRecords = groupedByDay.get(dayKey) || [];
              const emojis = dayRecords.map((entry) => entry.emoji).join(' ');
              const selectedClass = selectedDateKey === dayKey ? ' selected-day' : '';

              cells.push(`
                <button class="calendar-cell ${inCurrentMonth ? '' : 'muted-day'}${selectedClass}" type="button" data-date-key="${dayKey}">
                  <div class="calendar-day-number">${dayDate.getDate()}</div>
                  <div class="calendar-events">
                    <div class="calendar-icons">${emojis || ''}</div>
                  </div>
                </button>
              `);
            }

            return cells.join('');
          }

          function renderSelectedDay() {
            if (!selectedDateKey) {
              return '<div class="calendar-day-details muted">Нажмите на день, чтобы увидеть записи.</div>';
            }

            const selectedRecords = groupedByDay.get(selectedDateKey) || [];
            if (!selectedRecords.length) {
              return `<div class="calendar-day-details"><p class="calendar-day-title">${formatDateLong(selectedDateKey)}</p><div class="muted">Записей нет.</div></div>`;
            }

            const items = selectedRecords
              .sort((a, b) => b.ts - a.ts)
              .map((entry) => `<div class="calendar-event" title="${entry.title}">${entry.title}</div>`)
              .join('');

            return `
              <div class="calendar-day-details">
                <p class="calendar-day-title">${formatDateLong(selectedDateKey)}</p>
                ${items}
              </div>
            `;
          }

          function renderMonth() {
            const monthDate = new Date();
            monthDate.setDate(1);
            monthDate.setMonth(monthDate.getMonth() + monthOffset);

            listEl.innerHTML = `
              <div class="calendar-toolbar">
                <button id="calendarPrevMonth" class="calendar-nav" type="button">←</button>
                <div class="calendar-month">${monthNames[monthDate.getMonth()]} ${monthDate.getFullYear()}</div>
                <button id="calendarNextMonth" class="calendar-nav" type="button">→</button>
              </div>
              <div class="calendar-weekdays">${weekdays.map((day) => `<div class="calendar-weekday">${day}</div>`).join('')}</div>
              <div class="calendar-grid">${buildCalendarGrid(monthDate)}</div>
              ${renderSelectedDay()}
            `;

            document.getElementById('calendarPrevMonth').addEventListener('click', () => {
              monthOffset -= 1;
              renderMonth();
            });
            document.getElementById('calendarNextMonth').addEventListener('click', () => {
              monthOffset += 1;
              renderMonth();
            });

            listEl.querySelectorAll('[data-date-key]').forEach((cell) => {
              cell.addEventListener('click', () => {
                selectedDateKey = cell.getAttribute('data-date-key');
                renderMonth();
              });
            });
          }

          renderMonth();
        } catch (error) {
          statusEl.className = 'status error';
          statusEl.innerText = 'Не удалось загрузить календарь.';
          statusEl.classList.remove('hidden');
          listEl.innerHTML = '<div class="muted">Попробуйте позже.</div>';
        }
      }

          toggleEventForm(true);
        });

        document.getElementById('cancelEventBtn').addEventListener('click', () => {
          resetEventForm();
          hideEventStatus();
          toggleEventForm(false);
        });

        document.getElementById('eventsList').addEventListener('click', async (event) => {
          const deleteBtn = event.target.closest('[data-delete-event-id]');
          if (!deleteBtn) return;

          const confirmed = await showDeleteConfirm('Удалить событие?');
          if (!confirmed) return;

          const eventId = Number(deleteBtn.getAttribute('data-delete-event-id'));
          if (!Number.isFinite(eventId)) return;

          deleteBtn.disabled = true;
          try {
            await deleteEvent(petId, eventId);
            setEventStatus('success', 'Событие удалено ✅');
            await refreshEvents();
          } catch (error) {
            const statusCodeText = error.status ? ` (${error.status})` : '';
            setEventStatus('error', `Ошибка${statusCodeText}: ${error.message || 'не удалось удалить запись.'}`);
            deleteBtn.disabled = false;
          }
        });

        const refreshEvents = async () => {
          const events = await fetchEvents(petId);
          renderEventsList(events);
        };

        document.getElementById('saveEventBtn').addEventListener('click', async () => {
          const saveBtn = document.getElementById('saveEventBtn');
          const type = document.getElementById('eventType').value;
          const title = document.getElementById('eventTitle').value.trim();
          const description = document.getElementById('eventDescription').value.trim();
          const eventDate = document.getElementById('eventDate').value;

          if (!title) {
            setEventStatus('error', 'Укажите заголовок события.');
            return;
          }

          const payload = {
            type,
            title,
            description: description || null,
          };

          if (eventDate) {
            payload.event_date = eventDate;
          }

          saveBtn.disabled = true;
          try {
            await createEvent(petId, payload);
            setEventStatus('success', 'Событие сохранено ✅');
            resetEventForm();
            toggleEventForm(false);
            await refreshEvents();
          } catch (error) {
            const statusCodeText = error.status ? ` (${error.status})` : '';
            setEventStatus('error', `Ошибка${statusCodeText}: ${error.message || 'не удалось сохранить событие.'}`);
          } finally {
            saveBtn.disabled = false;
          }
        });

        try {
          await refreshEvents();
        } catch (error) {
          const statusCodeText = error.status ? ` (${error.status})` : '';
          setEventStatus('error', `Ошибка${statusCodeText}: ${error.message || 'не удалось загрузить список событий.'}`);
          renderEventsList([]);
        }
      }

      function setInfoStatus(type, message) {
        const statusEl = document.getElementById('infoStatus');
        if (!statusEl) return;

        statusEl.className = `status ${type}`;
        statusEl.innerText = message;
        statusEl.classList.remove('hidden');

        if (infoStatusTimer) {
          clearTimeout(infoStatusTimer);
          infoStatusTimer = null;
        }

        if (type === 'success') {
          infoStatusTimer = setTimeout(() => {
            statusEl.classList.add('hidden');
          }, 1500);
        }
      }

      function toggleBirthMode(mode) {
        const dateWrap = document.getElementById('birthDateWrap');
        const yearWrap = document.getElementById('birthYearWrap');
        const modeDateInput = document.getElementById('birthModeDate');
        const modeYearInput = document.getElementById('birthModeYear');

        const isDate = mode === 'date';
        dateWrap.classList.toggle('hidden', !isDate);
        yearWrap.classList.toggle('hidden', isDate);
        modeDateInput.checked = isDate;
        modeYearInput.checked = !isDate;
      }

      async function savePetInfo(petId) {
        const saveBtn = document.getElementById('saveInfoBtn');
        const name = document.getElementById('infoNameInput').value.trim();
        const sex = document.getElementById('infoSexSelect').value;
        const chipNumberRaw = document.getElementById('infoChipInput').value.trim();
        const birthMode = document.querySelector('input[name="birthMode"]:checked')?.value || 'date';
        const birthDate = document.getElementById('infoBirthDate').value;
        const birthYearRaw = document.getElementById('infoBirthYear').value.trim();

        if (!name) {
          setInfoStatus('error', 'Имя обязательно для заполнения.');
          return;
        }

        const payload = {
          name,
          sex,
          birth_mode: birthMode,
          chip_number: chipNumberRaw || null,
        };

        if (birthMode === 'date') {
          if (!birthDate) {
            setInfoStatus('error', 'Укажите дату рождения.');
            return;
          }
          payload.birth_date = birthDate;
        } else {
          const birthYear = Number(birthYearRaw);
          if (!Number.isInteger(birthYear) || birthYear < 1900 || birthYear > 2100) {
            setInfoStatus('error', 'Год рождения должен быть от 1900 до 2100.');
            return;
          }
          payload.birth_year = birthYear;
        }

        saveBtn.disabled = true;
        try {
          const response = await fetch(`/api/pets/${petId}`, {
            method: 'PATCH',
            headers: getApiHeaders(),
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(errData.error || 'Не удалось сохранить изменения');
          }

          const responsePayload = await response.json().catch(() => ({}));
          if (responsePayload.pet) {
            petCache.set(String(petId), responsePayload.pet);
          }

          setInfoStatus('success', 'Сохранено ✅');
          setTimeout(() => {
            petCache.delete(String(petId));
            setHash(`#pet/${petId}`);
          }, 800);
        } catch (error) {
          setInfoStatus('error', error.message || 'Ошибка сохранения. Попробуйте еще раз.');
        } finally {
          saveBtn.disabled = false;
        }
      }

      async function renderPetInfoScreen(petId) {
        screenSectionEl.innerHTML = `
          <div class="row"><button class="back-btn" id="backToProfileBtn">← Назад</button></div>
          <h3>Информация о питомце</h3>
          <label class="label" for="infoNameInput">Имя</label>
          <input id="infoNameInput" class="field" type="text" maxlength="64" />

          <label class="label" for="infoSexSelect">Пол</label>
          <select id="infoSexSelect" class="field">
            <option value="unknown">Неизвестно</option>
            <option value="male">Самец</option>
            <option value="female">Самка</option>
          </select>

          <label class="label">Дата рождения</label>
          <div class="birth-mode">
            <label><input id="birthModeDate" type="radio" name="birthMode" value="date" checked /> Точная дата</label>
            <label><input id="birthModeYear" type="radio" name="birthMode" value="year" /> Только год</label>
          </div>

          <div id="birthDateWrap">
            <input id="infoBirthDate" class="field" type="date" />
          </div>
          <div id="birthYearWrap" class="hidden">
            <input id="infoBirthYear" class="field" type="number" min="1900" max="2100" placeholder="Например, 2020" />
          </div>

          <label class="label" for="infoChipInput">Номер чипа (опционально)</label>
          <input id="infoChipInput" class="field" type="text" maxlength="128" />

          <div class="row">
            <button id="saveInfoBtn" type="button" class="primary">Сохранить</button>
            <button id="deleteProfileBtn" type="button" class="icon-btn danger-btn">🗑 Удалить профиль питомца</button>
          </div>
          <div id="infoStatus" class="status hidden"></div>
        `;

        document.getElementById('backToProfileBtn').addEventListener('click', () => setHash(`#pet/${petId}`));
        document.getElementById('birthModeDate').addEventListener('change', () => toggleBirthMode('date'));
        document.getElementById('birthModeYear').addEventListener('change', () => toggleBirthMode('year'));
        document.getElementById('saveInfoBtn').addEventListener('click', () => savePetInfo(petId));
        document.getElementById('deleteProfileBtn').addEventListener('click', async () => {
          const confirmed = await showDeleteConfirm('Удалить питомца? Все данные будут удалены.');
          if (!confirmed) return;

          try {
            await deletePet(petId);
            await loadPets();
            setHash('#list');
          } catch (error) {
            setInfoStatus('error', error.message || 'Ошибка удаления. Попробуйте позже.');
          }
        });

        try {
          const pet = await api_get_pet(petId);
          if (!pet) {
            setHash('#list');
            return;
          }

          document.getElementById('infoNameInput').value = pet.name || '';
          document.getElementById('infoSexSelect').value = pet.sex || 'unknown';
          document.getElementById('infoChipInput').value = pet.chip_number || '';

          if (pet.birth_year) {
            document.getElementById('infoBirthYear').value = String(pet.birth_year);
            toggleBirthMode('year');
          } else {
            document.getElementById('infoBirthDate').value = pet.birth_date || '';
            toggleBirthMode('date');
          }
        } catch (error) {
          setInfoStatus('error', 'Не удалось загрузить данные питомца.');
        }
      }

      async function savePet() {
        formErrorEl.innerText = '';
        const name = petNameInput.value.trim();

        if (!name) {
          formErrorEl.innerText = 'Введите имя питомца';
          return;
        }

        savePetBtn.disabled = true;
        try {
          const response = await fetch('/api/pets', {
            method: 'POST',
            headers: getApiHeaders(),
            body: JSON.stringify({ name, type: selectedType }),
          });

          if (!response.ok) {
            throw new Error('Не удалось сохранить питомца');
          }

          petNameInput.value = '';
          setType('dog');
          await loadPets();
          const payload = await response.json().catch(() => ({}));
          const newPetId = payload.pet?.id || payload.id;
          if (newPetId) {
            setHash(`#pet/${newPetId}`);
            return;
          }
          setHash('#list');
        } catch (error) {
          formErrorEl.innerText = 'Ошибка сохранения. Попробуйте еще раз.';
        } finally {
          savePetBtn.disabled = false;
        }
      }

      async function renderRoute() {
        if (!tgInitData) {
          showScreen('list');
          return;
        }

        const hash = window.location.hash || '#list';
        const route = hash.replace(/^#/, '');

        const petRouteMatch = route.match(/^pet\/(\d+)(?:\/(.+))?$/);
        updateBottomBar(route);

        if (route === 'list') {
          showScreen('list');
          return;
        }

        if (route === 'add') {
          showScreen('add');
          return;
        }

        if (!petRouteMatch) {
          setHash('#list');
          return;
        }

        const petId = petRouteMatch[1];
        const section = petRouteMatch[2];

        if (section) {
          renderLoadingState(screenSectionEl, 'Загружаем раздел...');
          showScreen('section');
        } else {
          renderLoadingState(screenPetEl);
          showScreen('pet');
        }

        try {
          const [pet, petSummary] = await Promise.all([
            api_get_pet(petId, { force: true }),
            fetchPetSummary(petId),
          ]);

          if (!pet || !petSummary) {
            setHash('#list');
            return;
          }

          if (section) {
            renderSectionScreen(petId, section);
            showScreen('section');
            return;
          }

          renderPetProfile(pet, petSummary);
          showScreen('pet');
        } catch (error) {
          userEl.innerText = 'Не удалось загрузить экран питомца.';
          setHash('#list');
        }
      }

      async function bootstrap() {
        if (!tgInitData) {
          userEl.innerText = 'Открыто не из Telegram';
          renderPets([]);
          showScreen('list');
          return;
        }

        const firstName = user?.first_name || 'друг';
        userEl.innerText = `Привет, ${firstName}!`;

        try {
          await loadPets();
          if (!window.location.hash) {
            window.location.hash = '#list';
          }
          await renderRoute();
        } catch (error) {
          userEl.innerText = 'Сервер недоступен. Попробуйте позже.';
          renderPets([]);
          showScreen('list');
        }
      }

      btnBack.addEventListener('click', () => {
        const petRoute = getCurrentPetRoute();
        if (petRoute) {
          setHash('#list');
          return;
        }
        if ((window.location.hash || '#list') === '#add') {
          setHash('#list');
        }
      });
      btnAddRecord.addEventListener('click', () => {
        const petRoute = getCurrentPetRoute();
        if (!petRoute) {
          alert('Скоро: добавление записи');
          return;
        }
        setHash(`#pet/${petRoute.petId}/calendar`);
      });
      dogTypeBtn.addEventListener('click', () => setType('dog'));
      catTypeBtn.addEventListener('click', () => setType('cat'));
      savePetBtn.addEventListener('click', savePet);
      addPetListBtn.addEventListener('click', () => setHash('#add'));
      window.addEventListener('hashchange', () => {
        renderRoute();
      });

      bootstrap();
    </script>
  </body>
</html>
