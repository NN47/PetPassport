<!doctype html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>PetPass</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      body{font-family:system-ui; padding:16px;}
      .card{border:1px solid #ddd; border-radius:16px; padding:16px;}
      button{padding:12px 14px; border-radius:12px; border:0;}
    </style>
  </head>
  <body>
    <div class="card">
      <h2>PetPass 🐶🐱</h2>
      <div id="u"></div>
      <p>Если ты это видишь внутри Telegram — Mini App работает.</p>
      <button onclick="Telegram.WebApp.close()">Закрыть</button>
    </div>

    <script>
      const tg = window.Telegram.WebApp;
      tg.ready();
      document.getElementById('u').innerText =
        tg.initDataUnsafe?.user
          ? ("Привет, " + tg.initDataUnsafe.user.first_name + "!")
          : "Открыто не из Telegram";
    </script>
  </body>
</html>
